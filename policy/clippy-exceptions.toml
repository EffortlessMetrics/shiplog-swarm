schema_version = 1
policy = "clippy-exceptions"
owner = "EffortlessMetrics"
status = "advisory"

# Per-occurrence Clippy suppressions. Cited from source as
#
#     #[expect(<lint>, reason = "policy:<id>")]
#
# The Clippy ledger checker (PR #150) verifies that:
#   - bare `#[allow(clippy::...)]` does not exist in source,
#   - every `#[expect(clippy::..., reason = "policy:...")]` in source has a
#     matching entry here,
#   - every entry here is cited from at least one source location.
#
# See docs/CLIPPY_POLICY.md and docs/POLICY_ALLOWLISTS.md.

# Entries cited from source via `#[expect(clippy::FOO, reason = "policy:<id>")]`.
# Multiple source sites may share one id when the rationale is the same; the
# checker just verifies every cited id exists in this ledger and that no
# `#[allow(clippy::...)]` (bare) is present.

[[exception]]
id = "clippy-0001"
lint = "clippy::too_many_arguments"
classification = "wide-cli-and-engine-signatures"
owner = "shiplog::engine"
reason = "Several CLI command parsers and shiplog::engine entry points have wide signatures by design — they expose every relevant flag/path/config option as a parameter rather than packing them into a struct that loses argument-name documentation. The signatures are stable trust-surface API; refactoring to builder pattern is a follow-up release. Cited from 12 sites in apps/shiplog/src/main.rs (5), apps/shiplog/src/engine/mod.rs (6), crates/shiplog-team/src/core.rs (1)."
created = "2026-05-10"
review_after = "2026-09-10"
expires = "2027-02-10"

[exception.selector]
kind = "fn-signature"
container = "various"
text_contains = "fn ... ( ... )  // 8+ args"

[[exception]]
id = "clippy-0002"
lint = "clippy::collapsible_if"
classification = "intentional-readability"
owner = "shiplog::ingest::github"
reason = "`if let Some(cache) = self.cache { if let Some(cached) = cache.get(...) { ... } }` and similar patterns kept as nested `if let` for readability — the inner condition is conceptually a separate decision (cache present? AND cached value exists?). Collapsing into `if let Some(...) && let Some(...)` works on Rust 1.95 but loses the visual separation. Cited from 3 sites: 2 in the GitHub ingest module cache lookups, 1 in shiplog-redact alias cache."
created = "2026-05-10"
review_after = "2026-09-10"
expires = "2027-02-10"

[exception.selector]
kind = "expr"
container = "cache lookup"
text_contains = "if let Some(... cache ...)"
