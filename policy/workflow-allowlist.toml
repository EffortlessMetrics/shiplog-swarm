schema_version = 1
policy = "workflow-allowlist"
owner = "EffortlessMetrics"
status = "advisory"

# GitHub Actions workflows. Each entry captures the workflow's
# permissions, secrets used, and external actions. A new `uses:` line in
# any workflow is a policy event, not just a code change. The
# file-policy checker (PR #149) verifies that:
#   - every workflow file has an entry,
#   - declared external_actions match the actual uses: lines,
#   - secrets_used matches the actual ${{ secrets.* }} references.
# See docs/FILE_POLICY.md.

[[entry]]
path = ".github/workflows/pr-plan.yml"
owner = "release/ci"
reason = "Advisory LEM PR Plan. Emits target/ci/ci-plan.json against contracts/schemas/ci-plan.v1.schema.json. Reads policy/ci-budget.toml + policy/ci-lanes.toml + policy/ci-risk-packs.toml via `cargo xtask ci plan`. Never blocks merge in v0.5.0."
permissions = ["contents:read", "pull-requests:read"]
secrets_used = []
external_actions = [
  "actions/checkout@v6.0.2",
  "dtolnay/rust-toolchain@master",
  "Swatinem/rust-cache@v2",
  "actions/upload-artifact@v7",
]
created = "2026-05-10"
expires = "permanent"

[[entry]]
path = ".github/workflows/ci-actuals.yml"
owner = "release/ci"
reason = "CI Actuals collector. Triggers on workflow_run completion for every instrumented workflow, fetches per-job timings via `gh api`, joins to policy/ci-lanes.toml + policy/ci-budget.toml via `cargo xtask ci actuals`, emits target/ci/ci-actuals.json against contracts/schemas/ci-actuals.v1.schema.json. Closes the LEM feedback loop. Never blocks merge."
permissions = ["contents:read", "actions:read"]
secrets_used = ["GITHUB_TOKEN"]
external_actions = [
  "actions/checkout@v6.0.2",
  "dtolnay/rust-toolchain@master",
  "Swatinem/rust-cache@v2",
  "actions/upload-artifact@v7",
]
created = "2026-05-10"
expires = "permanent"

