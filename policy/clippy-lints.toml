schema_version = 1
policy = "clippy-lints"
owner = "EffortlessMetrics"
status = "advisory"
msrv = "1.95"

# `msrv` was bumped to "1.95" in PR #145 alongside the workspace toolchain
# bump. Planned 1.95-eligible lints were activated in PR #152 (Rust+Clippy
# ratchets); they appear below as [[active]] entries. `clippy::disallowed_fields`
# remains [[planned]] until protected seams are configured.
# `clippy::manual_pop_if` was removed because it does not exist in Clippy 1.95
# (verified via probe — `unknown lint` warning).
# See docs/CLIPPY_POLICY.md.

[posture]
panic_free_tests = true
allow_test_carveouts = false
suppression_style = "expect-with-policy-reason"
blanket_categories = false

# ── Currently active in workspace.lints (Cargo.toml) ───────────────────

[[active]]
name = "rust::unsafe_code"
level = "deny"
class = "unsafe-memory"
reason = "No unsafe code without a narrow reviewed exception."

[[active]]
name = "rust::missing_debug_implementations"
level = "allow"
class = "documentation"
reason = "Too many types lack Debug (53+); allow for now, revisit later. See clippy-debt.toml#clippy-debt-0003."
debt_ref = "clippy-debt-0003"

[[active]]
name = "clippy::enum_glob_use"
level = "warn"
class = "style"
reason = "Avoid `use SomeEnum::*;` — keep variants explicit."

[[active]]
name = "clippy::flat_map_option"
level = "warn"
class = "style"
reason = "Prefer `.filter_map()` over `.flat_map().filter().map()` chains."

# ── Rust 1.95 rustc lint floor (activated in PR #152) ──────────────────

[[active]]
name = "rust::unsafe_op_in_unsafe_fn"
level = "deny"
class = "unsafe-memory"
reason = "Unsafe operations must stay explicitly scoped."

[[active]]
name = "rust::unused_must_use"
level = "deny"
class = "silent-failure"
reason = "Must-use values represent work that cannot be silently discarded."

[[active]]
name = "rust::unexpected_cfgs"
level = "warn"
class = "configuration"
reason = "Surface stale cfg gates."

[[active]]
name = "rust::const_item_interior_mutations"
level = "deny"
class = "concurrency"
reason = "Const items with interior mutability are footguns."

[[active]]
name = "rust::function_casts_as_integer"
level = "deny"
class = "type-safety"
reason = "Function-pointer-to-integer casts should be deliberate."

[[active]]
name = "rust::unused_visibilities"
level = "warn"
class = "documentation"
reason = "Surface dead-code visibility decisions."

# ── Rust 1.94 / 1.95 Clippy ratchets (activated in PR #152) ────────────

[[active]]
name = "clippy::same_length_and_capacity"
level = "deny"
class = "unsafe-memory"
reason = "Catch raw-parts reconstruction mistakes."

[[active]]
name = "clippy::manual_checked_ops"
level = "warn"
class = "numeric"
reason = "Prefer checked arithmetic over manual divide-by-zero guards."

[[active]]
name = "clippy::manual_take"
level = "warn"
class = "ownership"
reason = "Use std::mem::take instead of manual reimplementation."

[[active]]
name = "clippy::duration_suboptimal_units"
level = "warn"
class = "time"
reason = "Make durations legible without mental unit conversion."

[[active]]
name = "clippy::unnecessary_trailing_comma"
level = "warn"
class = "style"
reason = "Keep format macro calls clean."

[[active]]
name = "clippy::needless_type_cast"
level = "warn"
class = "type-safety"
reason = "Avoid no-op casts."

[[active]]
name = "clippy::manual_ilog2"
level = "warn"
class = "numeric"
reason = "Prefer ilog2 over manual bit-counting."

[[active]]
name = "clippy::decimal_bitwise_operands"
level = "warn"
class = "numeric"
reason = "Bitwise operators on decimal-literal operands are usually a bug."

[[active]]
name = "clippy::unnecessary_sort_by"
level = "warn"
class = "collections"
reason = "Prefer `sort_by_key(|x| std::cmp::Reverse(...))` over comparator closures. The two existing sites were fixed inline in PR #145."

# ── Tier-2: only activate per class where the inner-struct refactor is
#    not practical and the protected field genuinely lives on a `pub` type.
#    For classes that go fully private via inner-struct (e.g. cache-internals
#    in #194), the type system is the protection mechanism and a future
#    ledger-driven `xtask` checker handles the public-API regression path.
#    See docs/CLIPPY_PROTECTED_FIELDS.md activation ladder and the
#    post-#194 probe finding recorded against `cpf-0005` in
#    `policy/clippy-protected-fields.toml`. ────────────────────────────

[[planned]]
name = "clippy::disallowed_fields"
level = "deny"
activate_when_msrv = "1.95"
class = "architecture"
reason = "Ban direct field access across protected seams. Tier-2 tool: only applicable to classes that genuinely keep protected raw fields on a `pub` type. For classes that take the inner-struct refactor path (move raw fields onto a private inner type that external code cannot name), the lint produces config-level `\"does not refer to a reachable field\"` warnings against the now-nonexistent public field paths — see the post-#194 activation probe recorded in `cpf-0005`. cache-internals is `\"type-enforced\"` (no lint needed); the lint stays `[[planned]]` against the possibility that one of the remaining five classes (redaction internals, bundle paths, trust receipts, source opaque IDs, policy ledger metadata) keeps protected fields on a `pub` type after its own refactor pass. Activation is per-class, never workspace-wide."
