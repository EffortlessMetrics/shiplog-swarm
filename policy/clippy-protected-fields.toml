schema_version = 1
policy = "clippy-protected-fields"
owner = "EffortlessMetrics"
status = "advisory"

# Scaffold for `clippy::disallowed_fields`. The lint is currently
# `[[planned]]` in `policy/clippy-lints.toml` and is NOT activated by this
# file. The six classes below come from `docs/CLIPPY_PROTECTED_FIELDS.md`
# (#188) and encode the boundary, invariant, and field candidates for each
# seam. Entries are intentionally scaffolded; the exact field set for each
# class is finalised in the per-class refactor PR that introduces the
# accessor surface, and `clippy.toml` only gains a `disallowed_fields`
# entry after that refactor lands.
#
# Per-entry shape:
#
#   id                    Stable identifier for cross-reference. cpf-NNNN.
#   slug                  Short kebab-case name (matches the section in the doc).
#   title                 Human-readable class name.
#   invariant             What the accessor protects. One or two sentences.
#   boundary_crate        Crate that owns the accessor surface for this class.
#                         "mixed" if the seam crosses crates and each crate
#                         owns its share.
#   boundary_module       Module path under the boundary crate. May be a
#                         pattern (e.g. "shiplog-redact::*").
#   accessor_pattern      One-line description of the accessor shape that
#                         callers must go through.
#   failure_mode          The kind of regression the lint catches if the
#                         accessor is bypassed.
#   field_candidates      List of known or suspected protected fields, in
#                         the form "<type>::<field>". Use the literal
#                         string "TODO: â€¦" when the exact field set is not
#                         yet known. The list is finalised when the
#                         accessor-refactor PR for this class lands.
#   activation_status     One of:
#                           - "scaffolded"           â€” class documented, fields
#                                                      listed/TODO, no accessor
#                                                      refactor yet.
#                           - "accessor-ready"       â€” external-call-site grep
#                                                      shows no caller bypasses
#                                                      the public API; the seam
#                                                      may still need an
#                                                      inner-struct split
#                                                      before `disallowed_fields`
#                                                      can target it without
#                                                      flagging the owning impl.
#                           - "clippy-ready"         â€” protected raw fields
#                                                      have been moved onto a
#                                                      private inner struct
#                                                      that external code
#                                                      cannot name. The lint's
#                                                      target path
#                                                      (`<PublicType>::*`) no
#                                                      longer matches any
#                                                      internal access in the
#                                                      owning crate.
#                                                      *Probe required* before
#                                                      activation: see
#                                                      `"type-enforced"`.
#                           - "type-enforced"        â€” activation probe found
#                                                      that
#                                                      `clippy::disallowed_fields`
#                                                      emits config-level
#                                                      metadata warnings
#                                                      ("does not refer to a
#                                                      reachable field") for
#                                                      paths that no longer
#                                                      resolve to live fields,
#                                                      and those warnings
#                                                      cannot be suppressed
#                                                      under `-D warnings`.
#                                                      So once the
#                                                      inner-struct refactor
#                                                      lands, the lint is the
#                                                      wrong tool. The
#                                                      protection mechanism for
#                                                      a `"type-enforced"`
#                                                      class is: (a) the type
#                                                      system (the inner type
#                                                      is private and cannot
#                                                      be named externally),
#                                                      and (b) optionally a
#                                                      future `xtask` checker
#                                                      that scans the public
#                                                      API surface of the
#                                                      owning crate for
#                                                      regressions
#                                                      (`pub fn raw_*`,
#                                                      `pub` items on the
#                                                      inner type, etc.).
#                           - "lint-active"          â€” `clippy::disallowed_fields`
#                                                      entry covers this class
#                                                      and is enforced in CI.
#                                                      Reserved for classes
#                                                      whose protected fields
#                                                      genuinely live on a
#                                                      `pub` type (inner-struct
#                                                      pattern not practical
#                                                      for the class).
#   next_action           One-line description of the next PR for this class.
#   owner                 Workspace crate / sub-team that signs up for the
#                         accessor refactor and lint activation.
#   reason                One-sentence pointer to the doc section that
#                         carries the full design rationale.
#   created               ISO-8601 date the scaffold entry landed.
#   review_after          ISO-8601 date by which activation readiness
#                         should be reassessed.
#   expires               "permanent" â€” class scaffolds remain documented
#                         even after the lint activates; the entry stops
#                         being load-bearing only when the entire seam is
#                         removed from the codebase.
#
# Validation:
#   `cargo xtask check-policy-schemas` verifies the common header
#   (`schema_version`, `policy`, `owner`, `status`). Per-entry shape is
#   not yet enforced by a checker â€” the dedicated `disallowed_fields`
#   ledger checker is a follow-up PR that lands alongside the first
#   accessor refactor (see `docs/CLIPPY_PROTECTED_FIELDS.md` activation
#   ladder, step 3).
#
# See:
#   docs/CLIPPY_PROTECTED_FIELDS.md  Seam doctrine + activation ladder.
#   docs/CLIPPY_POLICY.md            Overall Clippy policy.
#   docs/POLICY_ALLOWLISTS.md        Common header schema.
#   policy/clippy-lints.toml         `[[planned]] disallowed_fields`.

[[class]]
id = "cpf-0001"
slug = "redaction-internals"
title = "Redaction internals"
invariant = "Alias maps, HMAC key material, and profile descriptor state must never be exposed in raw form. Internal name â†’ alias mappings stay private; lookups go through accessors that return the alias plus the redaction profile it was minted under."
boundary_crate = "shiplog-redact"
boundary_module = "shiplog-redact::*"
accessor_pattern = "The internal alias-store type is `pub(crate)`, so external code cannot name it. Its fields are implicitly private. The public facade `DeterministicRedactor` holds the alias store as an implicitly private field and exposes accessors (`alias`, `load_cache`, `save_cache`, `redact_events`, `redact_workstreams`). All free functions in `policy.rs` and `projector.rs` are `pub(crate)`."
failure_mode = "A renderer reads `redactor.aliases` directly and emits the inner real name to a manager- or public-profile bundle. The redaction profile leak goes unnoticed because no test exercises the raw read path."
# Audited 2026-05-12 (post-#208):
#   - `DeterministicAliasStore` (the type carrying alias map + HMAC key
#     material) is declared `pub(crate)` in
#     `crates/shiplog-redact/src/alias.rs`. External code outside
#     `shiplog-redact` cannot name the type, so cannot construct it
#     and cannot read its fields by path.
#   - The two protected fields on `DeterministicAliasStore` â€”
#     `key: Vec<u8>` (HMAC key material) and `cache:
#     Mutex<BTreeMap<String, String>>` (alias cache) â€” carry no
#     `pub` keyword and are implicitly private.
#   - `DeterministicRedactor` is the `pub struct` facade. Its single
#     field `aliases: DeterministicAliasStore` is implicitly private.
#     External code reaches alias state only via the type's public
#     methods (`alias`, `load_cache`, `save_cache`, `redact_events`,
#     `redact_workstreams`).
#   - `RedactionProfile` is a `pub enum` of variant tags
#     (`Internal`, `Manager`, `Public`) with no internal struct state
#     to protect; not a `disallowed_fields` candidate.
#   - Every free function in `policy.rs` and `projector.rs` is
#     `pub(crate)` (`redact_event_with_aliases`,
#     `redact_events_with_aliases`, `redact_workstream_with_aliases`,
#     `redact_workstreams_with_aliases`, `project_events_with_aliases`,
#     `project_workstreams_with_aliases`); the public API surface is
#     entirely on `DeterministicRedactor`.
#
# The seam was designed with the right shape from day one â€” no
# inner-struct refactor (#194-style) was ever needed. Redaction-
# internals advances directly from `"scaffolded"` to `"type-enforced"`,
# matching the post-#196 posture of cache-internals (`cpf-0005`) via
# a different path: structural privacy from the start, not retrofit.
field_candidates = [
  "DeterministicAliasStore::key (implicitly private; container type is pub(crate); type-enforced)",
  "DeterministicAliasStore::cache (implicitly private; container type is pub(crate); type-enforced)",
  "DeterministicRedactor::aliases (implicitly private on the pub facade; only reachable via accessors)",
  "TODO: future HMAC key material fields on any new redactor type, if added (apply inner-struct pattern from day one to preserve this posture)",
  "TODO: future profile descriptor fields, if state is added to a profile type beyond the current variant tag (apply inner-struct pattern from day one)",
]
activation_status = "type-enforced"
next_action = "Nothing to do for this class today: type system already enforces the seam. If any new state-bearing redaction type lands in the future (e.g. an explicit profile descriptor struct), apply the inner-struct pattern from day one â€” see the post-#196 cache-internals tier-2 framing. A future ledger-driven `xtask check-protected-fields` checker (framed as optional step 6 in `docs/CLIPPY_PROTECTED_FIELDS.md`) would scan for regressions like a future `pub fn raw_aliases(&self) -> &BTreeMap<...>` accessor on `DeterministicRedactor`."
owner = "shiplog-redact"
reason = "See docs/CLIPPY_PROTECTED_FIELDS.md#1-redaction-internals for the seam doctrine and failure mode."
created = "2026-05-11"
review_after = "2026-11-11"
expires = "permanent"

[[class]]
id = "cpf-0002"
slug = "bundle-paths"
title = "Bundle paths"
invariant = "Paths recorded in `bundle.manifest.json` and `share.manifest.json` must be relative to the run directory, must not include the run-dir prefix itself, and must never include absolute paths from the producer's filesystem. Accessors normalise on write and validate on read."
boundary_crate = "shiplog-bundle"
boundary_module = "shiplog-bundle::*"
accessor_pattern = "`BundleManifest` / `ShareManifest` expose `entries()` returning normalised relative paths; raw `path: PathBuf` style fields on manifest entries and the run-artifact path helpers are private. The cache-internals lesson applies: when these types land, the raw fields should live on a private inner struct from day one so `disallowed_fields` is the right tool only if a public path field is unavoidable."
failure_mode = "A test uses a producer-local absolute path; the path leaks into the manifest; another machine cannot verify the bundle because the path is invalid there."
# Audited 2026-05-12 (post-#204):
#   - `RunArtifactPaths::out_dir` was declared `pub PathBuf` but was
#     functionally private already. Workspace grep found zero sites
#     outside `crates/shiplog-bundle/` reading `.out_dir` from a
#     `RunArtifactPaths` instance; every external caller constructs via
#     `RunArtifactPaths::new(...)` and uses the accessor methods
#     (`packet_md`, `ledger_events`, `coverage_manifest`,
#     `bundle_manifest`, `redaction_aliases`, `profile_packet`). The
#     follow-up framed by #206 landed in #207, tightening visibility to
#     `pub(crate)` with no caller breakage. The seam is now structurally
#     private; the protection mechanism for cpf-0002 is the type system,
#     same as cpf-0005 cache-internals post-#194.
#   - The `\.out_dir` hits in `apps/shiplog/src/main.rs` resolve to
#     `RunOutputs::out_dir` in `shiplog-engine`, a different type with
#     the same field name. `RunOutputs::out_dir` carries the producer-
#     local run-directory path which callers legitimately compose
#     artifact paths from; it is not the "manifest entry path leaks
#     producer-local absolute" failure mode this seam guards against,
#     so it is intentionally NOT a `cpf-0002` candidate.
#   - The bundle / share manifest entry types named in the doc do not
#     yet exist in the codebase. The protected `path` fields on those
#     types are therefore TODOs: nothing to enforce against today, and
#     the audit history above is recorded so that when those types
#     land, the per-class refactor pass uses the cache-internals
#     inner-struct pattern from day one rather than retrofitting it
#     after a probe like cache-internals (#192) needed.
field_candidates = [
  "RunArtifactPaths::out_dir (tightened to pub(crate) in #207; no external readers)",
  "TODO: BundleManifest entries' `path` field once manifest types exist (apply inner-struct pattern from day one)",
  "TODO: ShareManifest entries' `path` field once manifest types exist (apply inner-struct pattern from day one)",
  "TODO: file checksum receipt `path` field on zip-archive entry types (apply inner-struct pattern from day one)",
]
activation_status = "scaffolded"
next_action = "The visibility-tightening follow-up framed by #206 landed as #207 (`RunArtifactPaths::out_dir` is now `pub(crate)`). The remaining work for this class waits for the bundle/share manifest entry types to land â€” separate engineering project, not currently in flight. When those types arrive, the per-class refactor uses the inner-struct pattern from day one (cache-internals doctrine) so protected path fields are never on a `pub` type to begin with. `disallowed_fields` activation for this class remains unlikely per the cache-internals tier-2 framing recorded in #196."
owner = "shiplog-bundle"
reason = "See docs/CLIPPY_PROTECTED_FIELDS.md#2-bundle-paths for the seam doctrine and failure mode."
created = "2026-05-11"
review_after = "2026-11-11"
expires = "permanent"

[[class]]
id = "cpf-0003"
slug = "trust-receipts"
title = "Trust receipts"
invariant = "Hashes, signatures, and provenance receipts written to `intake.report.json`, `share.manifest.json`, and `bundle.manifest.json` must be computed via the canonical accessor on the source struct. Two callers that recompute the same receipt for the same input must produce byte-identical bytes."
boundary_crate = "mixed"
boundary_module = "shiplog-engine::intake_report, shiplog-bundle::manifest, shiplog-cache::receipt"
accessor_pattern = "Each receipt-emitting crate owns the canonical `compute_receipt()` accessor on its receipt type; raw `hash: [u8; 32]` style fields are private."
failure_mode = "One caller hashes the canonical fields; a second caller hashes a slightly different field order; the two receipts disagree for the same logical input and consumers diverge."
field_candidates = [
  "TODO: intake report receipt fields on `shiplog-engine::intake_report` once the type lands",
  "TODO: bundle/share manifest receipt fields on `shiplog-bundle::manifest` once types land",
  "TODO: cache receipt fields on `shiplog-cache::receipt` once the type lands",
]
activation_status = "scaffolded"
next_action = "Introduce the receipt types (some are not yet in the codebase); revisit candidate list as each type lands. Refactor is genuine, not just an audit."
owner = "shiplog-engine"
reason = "See docs/CLIPPY_PROTECTED_FIELDS.md#3-trust-receipts for the seam doctrine and failure mode."
created = "2026-05-11"
review_after = "2026-11-11"
expires = "permanent"

[[class]]
id = "cpf-0004"
slug = "source-opaque-ids"
title = "Source opaque IDs"
invariant = "Provider-specific identifiers (GitHub `node_id`, GitLab project IDs, Jira issue keys, Linear UUIDs, opaque `local_git` ref names) must be aliased before they cross a redaction profile boundary. Accessors return the aliased form for non-internal profiles and the raw form only when an `Internal` profile is explicitly requested."
boundary_crate = "mixed"
boundary_module = "shiplog-ingest-*, shiplog-schema, shiplog-redact"
accessor_pattern = "`shiplog-ingest-*` crates own the raw IDs (deserialised from API responses); `shiplog-schema` owns the canonical wrapped types; `shiplog-redact` is the only consumer that touches the raw form, and only to mint the alias."
failure_mode = "A public-profile render reads `event.github_node_id` directly; the rendered packet leaks the GitHub-internal `node_id` that should have been aliased."
field_candidates = [
  "TODO: `node_id` / `id` style fields on per-source raw response structs in `shiplog-ingest-github` (currently `pub`)",
  "TODO: equivalent fields on `shiplog-ingest-gitlab`, `shiplog-ingest-jira`, `shiplog-ingest-linear` raw response structs once those adapters exist",
  "TODO: opaque ref-name fields on `shiplog-ingest-git` and `shiplog-ingest-manual`",
  "TODO: opaque-ID fields on the `*Event` types in `shiplog-schema` once wrapping is finalised",
]
activation_status = "scaffolded"
next_action = "Inventory current `pub` opaque-ID fields across `shiplog-ingest-*` and `shiplog-schema`; populate the candidate list before scheduling the accessor refactor. This is the largest class by surface area."
owner = "shiplog-ingest-github"
reason = "See docs/CLIPPY_PROTECTED_FIELDS.md#4-source-opaque-ids for the seam doctrine and failure mode."
created = "2026-05-11"
review_after = "2026-11-11"
expires = "permanent"

[[class]]
id = "cpf-0005"
slug = "cache-internals"
title = "Cache internals"
invariant = "The SQLite-backed `shiplog-cache` exposes a query API; the raw `rusqlite::Connection`, default TTL state, and any future cache-key internal layout must be private. Cache key construction goes through the `CacheKey::*` builders which centralise the cache namespace + version + hash algorithm."
boundary_crate = "shiplog-cache"
boundary_module = "shiplog-cache::*"
accessor_pattern = "Public surface: `ApiCache::{open, open_read_only, open_in_memory, with_ttl, with_max_size, get, set, set_with_ttl, contains, cleanup_expired, count_older_than, cleanup_older_than, clear, stats, inspect}`. The raw fields live on the private `ApiCacheInner` struct that `ApiCache` wraps; external code cannot name `ApiCacheInner`."
failure_mode = "A new ingest adapter adds a `pub fn raw_connection(&self) -> &Connection` accessor on `ApiCache` to run a custom SQL query; the cache schema migrates in a future release; the custom query breaks silently. The protected paths below capture this â€” any caller that adds such an accessor would have to expose the raw `Connection` via an `ApiCache::*` field, which is the lint target."
# Verified three times during 2026-05-11:
#   - #192: every `.conn` access was inside
#     `crates/shiplog-cache/src/sqlite.rs` impl blocks; no caller
#     outside `shiplog-cache` reached the raw state. That proved the
#     seam was external-call-site clean.
#   - First activation probe (post-#192): discovered that
#     `clippy::disallowed_fields` is path-scope-blind â€” it fires on
#     every `self.conn` access including inside the owning `impl`. So
#     the activation could not ship as a one-line `clippy.toml`
#     change without reshaping the owning impl.
#   - #194: inner-struct refactor moved `{conn, default_ttl,
#     max_size_bytes}` onto a private `ApiCacheInner`; `ApiCache`
#     became a thin wrapper holding `inner: ApiCacheInner`. Public
#     API unchanged.
#   - Second activation probe (post-#194): adding the three
#     `ApiCache::*` paths to `disallowed-fields` produces
#     `"does not refer to a reachable field"` config-level warnings â€”
#     not silent acceptance, not a hard error. Those warnings fail
#     under `-D warnings` and cannot be suppressed by `#[expect]` /
#     `#[allow]` (they are not tied to a numbered lint). So
#     `disallowed_fields` is the wrong tool for a class that has gone
#     through the inner-struct refactor. Cache-internals advances to
#     `"type-enforced"`; the type system + a future ledger-driven
#     xtask checker on public API surfaces are the protection
#     mechanism going forward.
field_candidates = [
  "ApiCache::conn",
  "ApiCache::default_ttl",
  "ApiCache::max_size_bytes",
  "TODO: future schema-version row, if added (today: inline DDL in `ApiCache::open`)",
  "TODO: future `CacheKey` internal-state fields, if added (today: unit struct in `crates/shiplog-cache/src/key.rs`)",
]
activation_status = "type-enforced"
next_action = "Type-system protection is sufficient for cache-internals as of #194. The activation probe (post-#194) found that adding the three `ApiCache::*` paths to `clippy.toml`'s `disallowed-fields` array emits config-level metadata warnings (\"does not refer to a reachable field\") because the inner-struct refactor moved the fields off `ApiCache`. Those warnings fail under `-D warnings` and cannot be suppressed via `#[expect]`. Activating `clippy::disallowed_fields` for this class is therefore not the right move; the lint is the wrong tool once a class goes fully type-enforced. The recommended next protection layer is a generic ledger-driven `xtask` checker that scans the public API surface of each class's `boundary_crate` for regressions (`pub fn raw_*` accessors, `pub` items on the protected inner type, etc.). That checker is a separate engineering item; it does not block any other class's progress on the ladder."
owner = "shiplog-cache"
reason = "See docs/CLIPPY_PROTECTED_FIELDS.md#5-cache-internals for the seam doctrine and failure mode."
created = "2026-05-11"
review_after = "2026-11-11"
expires = "permanent"

[[class]]
id = "cpf-0006"
slug = "policy-ledger-metadata"
title = "Policy ledger metadata"
invariant = "Every `policy/*.toml` ledger carries a common header (`schema_version`, `policy`, `owner`, `status`). The header lives in a shared `Ledger<Body>` wrapper in `xtask::policy`; downstream consumers (the `cargo xtask check-*` checkers) access the body via the wrapper's accessor, never by destructuring the raw `toml::Table`."
boundary_crate = "xtask"
boundary_module = "xtask::policy"
accessor_pattern = "The wrapper struct owns the header validation; checkers read `ledger.body()` and never reach for `ledger.raw_table` or destructure the `toml::Table` directly."
failure_mode = "A new checker forgets to validate the common header and silently accepts an unversioned ledger. Drift in the header schema becomes invisible because individual checkers don't enforce it consistently."
field_candidates = [
  "TODO: `Ledger<Body>::raw_table` once the consolidated wrapper exists",
  "TODO: per-checker raw `toml::Table` fields that are currently re-parsed in each task module under `xtask::tasks::*`",
]
activation_status = "scaffolded"
next_action = "Consolidate the per-checker header parsing into the shared `Ledger<Body>` wrapper in `xtask::policy`; revisit candidate list against the actual wrapper shape before scheduling lint activation."
owner = "policy"
reason = "See docs/CLIPPY_PROTECTED_FIELDS.md#6-policy-ledger-metadata for the seam doctrine and failure mode."
created = "2026-05-11"
review_after = "2026-11-11"
expires = "permanent"
