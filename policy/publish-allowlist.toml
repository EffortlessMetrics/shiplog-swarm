schema_version = 1
policy = "publish-allowlist"
owner = "release"
status = "blocking"

# 0.7 crate-surface contraction publish control.
#
# Workspace membership is not publish eligibility. Release scripts must publish
# only the packages listed in publish.default_order. New public crates require
# an ADR before they can enter the publish order.

[publish]
release = "0.7"
default_order = ["shiplog"]
transitional_exceptions = []

[[package]]
name = "shiplog"
tier = "public-supported"
publish = true
reason = "Supported CLI package and primary user install surface."

[[package]]
name = "shiplog-testkit"
tier = "dev-only"
publish = false
reason = "Workspace test support; Cargo manifest also sets publish = false."

[[package]]
name = "xtask"
tier = "dev-only"
publish = false
reason = "Repository automation; Cargo manifest also sets publish = false."

[[historical]]
name = "shiplog-render-md"
tier = "historical-0.6"
reason = "0.6 implementation crate collapsed into shiplog::render::md."

