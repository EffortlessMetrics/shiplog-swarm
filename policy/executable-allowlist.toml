schema_version = 1
policy = "executable-allowlist"
owner = "EffortlessMetrics"
status = "advisory"

# Files with the executable bit set. Today these are the release-proof
# and demo scripts. The file-policy checker (PR #149) verifies that no
# unrecognized executable files exist.

[[allow]]
id = "exec-package-proof"
path = "scripts/package-proof.sh"
interpreter = "bash"
owner = "release"
reason = "Release preflight aggregator: package boundary + version + cargo-deny."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "exec-publish-dry-run"
path = "scripts/publish-dry-run.sh"
interpreter = "bash"
owner = "release"
reason = "crates.io publish dry-run for the v0.5.0 publish set, in dependency order."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "exec-publish-v0-5-0"
path = "scripts/publish-v0.5.0.sh"
interpreter = "bash"
owner = "release"
reason = "v0.5.0 crates.io publish driver: walks the dependency-ordered crate list under CARGO_REGISTRY_TOKEN."
created = "2026-05-10"
expires = "permanent"

[[allow]]
id = "exec-package-boundary-audit"
path = "scripts/package-boundary-audit.sh"
interpreter = "bash+python"
owner = "release"
reason = "Verifies published vs dev-only package classification against the workspace package set."
created = "2026-05-09"
review_after = "2026-12-09"

[[allow]]
id = "exec-package-version-audit"
path = "scripts/package-version-audit.sh"
interpreter = "bash+python"
owner = "release"
reason = "Verifies workspace package versions and internal dep req alignment."
created = "2026-05-09"
review_after = "2026-12-09"

[[allow]]
id = "exec-verify-release"
path = "scripts/verify-release.sh"
interpreter = "bash"
owner = "release"
reason = "Post-publication verification: GitHub assets, checksums, crates.io install, current-platform binary smoke."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "exec-release-install-smoke-sh"
path = "scripts/release-install-smoke.sh"
interpreter = "bash"
owner = "release"
reason = "Linux/macOS release artifact install smoke."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "exec-demo-review-rescue-sh"
path = "scripts/demo-review-rescue.sh"
interpreter = "bash"
owner = "docs"
reason = "No-network review-rescue demo path."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "exec-dev-check-sh"
path = "scripts/dev-check.sh"
interpreter = "bash"
owner = "devex"
reason = "Runs the CI fmt/clippy/test gate locally in one command."
created = "2026-07-11"
expires = "permanent"

[[allow]]
id = "exec-install-hooks-sh"
path = "scripts/install-hooks.sh"
interpreter = "bash"
owner = "devex"
reason = "Installs an opt-in git pre-commit hook that runs fmt + clippy before each commit."
created = "2026-07-11"
expires = "permanent"

# Note: Windows .ps1 scripts (release-install-smoke.ps1, demo-review-rescue.ps1)
# are listed in non-rust-allowlist.toml under the `scripts/*.ps1` glob but NOT
# here, because PowerShell scripts are invoked as `pwsh path/to/script.ps1`
# (they don't need the executable bit; git tree mode is 100644).
