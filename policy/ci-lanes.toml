schema_version = 1
policy = "ci-lanes"
owner = "EffortlessMetrics"
status = "advisory"

# Maps existing GitHub Actions workflows / jobs to lane assignments. These
# are tentative in v0.5.0 and become routed in PR #146 (PR plan emits the
# forecast), PR #153 (ripr advisory wired), PR #154 (bounded stochastic
# PR-fast carve-out), and PR #155 (broad lane routing). See
# docs/ci/test-evidence-lanes.md.

# Every lane declares: description, intent, runner, base_lem, default_pr,
# blocking. Optional: workflow, labels, branches, schedule, duplicate_of,
# outputs, target_lane, note.

# ── PR plan (added in PR #146) ────────────────────────────────────────

[lane.pr_plan]
description = "Forecast PR CI cost, touched risk packs, and selected lanes."
intent = "visibility"
runner = "ubuntu_24_04"
base_lem = 1
default_pr = true
blocking = false
workflow = ".github/workflows/pr-plan.yml"
workflow_name = "PR Plan"
job_name = "forecast"
outputs = ["target/ci/ci-plan.json"]

# ── ci.yml jobs (PR-fast required gate) ────────────────────────────────

[lane.ci_check]
description = "Primary shiplog PR correctness gate (Ubuntu)."
intent = "Rust correctness"
runner = "ubuntu_24_04"
base_lem = 12
default_pr = true
blocking = true
workflow = ".github/workflows/ci.yml"
workflow_name = "CI"
job_name = "Check (ubuntu-latest)"

[lane.ci_check_windows]
description = "Cross-platform parity check (Windows)."
intent = "Rust correctness (Windows parity)"
runner = "windows_latest"
base_lem = 36
default_pr = true
blocking = true
workflow = ".github/workflows/ci.yml"
workflow_name = "CI"
job_name = "Check (windows-latest)"
note = "Windows runners are 2x Linux billing; covered by ci-exception-0001."

[lane.ci_deny]
description = "Dependency policy: bans, advisories, licenses, sources."
intent = "dependency policy"
runner = "ubuntu_24_04"
base_lem = 4
default_pr = true
blocking = true
workflow = ".github/workflows/ci.yml"
workflow_name = "CI"
job_name = "cargo-deny"

[lane.ci_policy]
description = "Policy ledger enforcement: schemas + 10 blocking-allowlist checks."
intent = "policy enforcement"
runner = "ubuntu_24_04"
base_lem = 3
default_pr = true
blocking = true
workflow = ".github/workflows/ci.yml"
workflow_name = "CI"
job_name = "Policy gates"

# ── Standalone security workflow (label-gated; duplicate of ci_deny) ──

[lane.ci_security]
description = "Standalone cargo-deny workflow."
intent = "dependency policy"
runner = "ubuntu_24_04"
base_lem = 4
default_pr = false
blocking = false
workflow = ".github/workflows/security.yml"
workflow_name = "Security Checks"
job_name = "Cargo Deny Security"
duplicate_of = "lane.ci_deny"
labels = ["security-audit", "full-ci"]
branches = ["main"]
schedule = "weekly"
note = "Same intent as lane.ci_deny on PR; PR #155 routed PR fires to label-only (security-audit / full-ci). Push to main + weekly cron + dispatch unchanged."

# ── Stochastic lanes: bounded smoke vs broad sweep ─────────────────────
#
# Bounded smoke lanes (lane.bdd_smoke / .property_smoke / .fuzz_smoke,
# added in PR #154) run on every PR-fast and are designed to be cheap,
# deterministic, and scoped (touched-target for fuzz; foundation crates
# for property; fixed critical-flow scenarios for BDD). The broad
# sweeps below them (lane.bdd, .property, .fuzz_quick) keep running on
# PR until PR #155 routes the broad form to nightly + label.

[lane.bdd_smoke]
description = "Critical CLI flow BDD scenarios (merge + render contract), bounded and deterministic."
intent = "PR-fast acceptance smoke"
runner = "ubuntu_24_04"
base_lem = 6
default_pr = true
blocking = false
workflow = ".github/workflows/bdd-smoke.yml"
workflow_name = "BDD Smoke"
job_name = "smoke"
note = "Added in PR #154. Two scenarios: multi_source_merging_scenario_7_10_pipeline_contract (--features merge_pipeline) + multi_source_merging_scenario_7_8_render."

[lane.property_smoke]
description = "Foundation crate property tests at PROPTEST_CASES=64, deterministic seed."
intent = "PR-fast invariant smoke"
runner = "ubuntu_24_04"
base_lem = 5
default_pr = true
blocking = false
workflow = ".github/workflows/property-smoke.yml"
workflow_name = "Property Smoke"
job_name = "smoke"
note = "Added in PR #154. Bounded sweep over shiplog-ids, shiplog-schema, shiplog-coverage, shiplog-redact at 64 cases. Broad lane.property keeps PR-on-every until PR #155."

[lane.fuzz_smoke]
description = "Touched-target quick fuzz at 30s on Rust diffs."
intent = "PR-fast parser robustness"
runner = "ubuntu_24_04"
base_lem = 4
default_pr = true
blocking = false
workflow = ".github/workflows/fuzz-smoke.yml"
workflow_name = "Fuzz Smoke"
job_name = "smoke"
note = "Added in PR #154. Resolves changed paths to a subset of {parse_jsonl, parse_workstreams, parse_github_api, parse_gitlab_api, parse_jira_linear_api, parse_manual_events, parse_config, parse_template, parse_plugin_manifest}; if no parser surface is touched, the lane completes as a no-op. Broad lane.fuzz_quick keeps PR-on-every until PR #155."

[lane.bdd]
description = "BDD acceptance behavior checks (full 4-job matrix)."
intent = "CLI/user-flow behavior proof"
runner = "ubuntu_24_04"
base_lem = 32
default_pr = false
blocking = false
workflow = ".github/workflows/bdd-testing.yml"
workflow_name = "BDD Testing"
# No job_name set: workflow-catchall applies to all 5 jobs (BDD & Property
# Tests, Ingest Crate Tests, Render/Trust/Contract Crates, Optional Surface
# Tests, App Tests).
labels = ["bdd", "full-ci"]
schedule = "nightly"
note = "PR-fast smoke is lane.bdd_smoke (PR #154). PR #155 routed broad sweep to label-only PR (bdd / full-ci) + push to main + nightly cron + dispatch."

[lane.property]
description = "Property tests at 256 cases per crate (full sweep, all 13 crates)."
intent = "schema/property invariant"
runner = "ubuntu_24_04"
base_lem = 20
default_pr = false
blocking = false
workflow = ".github/workflows/property-testing.yml"
workflow_name = "Property Testing"
job_name = "Property Testing"
labels = ["property-tests", "full-ci"]
schedule = "nightly"
note = "PR-fast smoke is lane.property_smoke (PR #154). PR #155 routed broad sweep to label-only PR (property-tests / full-ci) + push to main + nightly cron + dispatch."

[lane.fuzz_quick]
description = "Quick-fuzz smoke (9 targets at 30s each)."
intent = "parser robustness"
runner = "ubuntu_24_04"
base_lem = 10
default_pr = false
blocking = false
workflow = ".github/workflows/fuzzing.yml"
workflow_name = "Fuzzing"
job_name = "Quick Fuzz (CI)"
labels = ["fuzz", "full-ci"]
schedule = "nightly"
note = "PR-fast touched-target smoke is lane.fuzz_smoke (PR #154). PR #155 routed broad 9-target sweep to label-only PR (fuzz / full-ci) + push to main + nightly cron + dispatch."

[lane.fuzz_extended]
description = "Extended fuzz (60 min × 9 targets)."
intent = "parser robustness (deep)"
runner = "ubuntu_24_04"
base_lem = 540
default_pr = false
blocking = false
workflow = ".github/workflows/fuzzing.yml"
workflow_name = "Fuzzing"
# Matrix job; actual GHA job names look like "Extended Fuzz (parse_jsonl)" etc.
# No job_name set: workflow-catchall picks them up for actuals.
schedule = "daily"

# ── Coverage and mutation (already correctly off PR) ───────────────────

[lane.coverage]
description = "Codecov execution-surface coverage."
intent = "execution-surface measurement"
runner = "ubuntu_24_04"
base_lem = 45
default_pr = false
blocking = false
workflow = ".github/workflows/coverage.yml"
workflow_name = "Coverage"
job_name = "Codecov Coverage"
labels = ["coverage", "full-ci"]
branches = ["main"]

[lane.mutation_weekly]
description = "Mutation testing across 22 crates (3 tiers, advisory baseline)."
intent = "test-strength evidence"
runner = "ubuntu_24_04"
base_lem = 120
default_pr = false
blocking = false
workflow = ".github/workflows/mutation-testing.yml"
workflow_name = "Mutation Testing"
job_name = "Mutation Testing"
labels = ["mutation", "full-ci"]
schedule = "weekly"

[lane.mutation_targeted]
description = "Targeted mutation for the touched risk-pack scope."
intent = "test-strength evidence (scoped)"
runner = "ubuntu_24_04"
base_lem = 45
default_pr = false
blocking = false
workflow = ".github/workflows/mutation-testing.yml"
labels = ["mutation", "full-ci"]
note = "Triggered by label (mutation / full-ci), risk pack, or severe ripr finding. PR #155 wired the label trigger; the workflow's job-level if-guard accepts mutation or full-ci. Risk-pack auto-application of the mutation label is a follow-up."

# ── ripr advisory (added in PR #153) ───────────────────────────────────

[lane.ripr_advisory]
description = "Static reachable-mutant exposure analysis on Rust diffs."
intent = "oracle-gap detection"
runner = "ubuntu_24_04"
base_lem = 4
default_pr = true
blocking = false
workflow = ".github/workflows/ripr.yml"
workflow_name = "ripr"
job_name = "advisory"
labels = ["ripr", "ripr-waive"]
outputs = ["target/ripr/ripr.json", "target/ripr/ripr.sarif"]

# ── Bot review lanes (advisory, external AI multiplier 4x) ─────────────

[lane.droid_review]
description = "Factory Droid auto-review (PR-time bot review + security)."
intent = "advisory bot review"
runner = "external_ai_review"
base_lem = 20
default_pr = true
blocking = false
workflow = ".github/workflows/droid-review.yml"
workflow_name = "Droid Auto Review"
job_name = "droid-review"

[lane.droid_security_scan]
description = "Factory Droid weekly security scan."
intent = "advisory security scan"
runner = "external_ai_review"
base_lem = 20
default_pr = false
blocking = false
workflow = ".github/workflows/droid-security-scan.yml"
workflow_name = "Droid Security Scan"
job_name = "droid-security-scan"
schedule = "weekly"

[lane.droid_tag]
description = "Out-of-band @droid mention handler."
intent = "interactive bot orchestration"
runner = "ubuntu_24_04"
base_lem = 5
default_pr = false
blocking = false
workflow = ".github/workflows/droid.yml"
workflow_name = "Droid Tag"
job_name = "droid"

# ── Release lanes (tag-triggered) ──────────────────────────────────────

[lane.release_preflight]
description = "Release preflight: package-proof + publish-dry-run."
intent = "publish readiness"
runner = "ubuntu_24_04"
base_lem = 8
default_pr = false
blocking = true
workflow = ".github/workflows/release.yml"
workflow_name = "Release"
job_name = "Release Preflight"

[lane.release_build]
description = "Multi-platform release build (Linux x86_64, macOS x86_64, macOS arm64, Windows x86_64)."
intent = "multi-platform release readiness"
runner = "macos_latest"
base_lem = 90
default_pr = false
blocking = true
workflow = ".github/workflows/release.yml"
workflow_name = "Release"
# Matrix job; GHA names look like "Build x86_64-unknown-linux-gnu" etc.
# Workflow-catchall picks them up; consider per-target lanes if drift analysis
# wants per-leg accuracy.
note = "macos_latest at 10x multiplier dominates the release LEM cost; Linux x86_64 and Windows x86_64 are the cheaper matrix legs."

[lane.release_validation]
description = "Smoke downloaded artifact + freshly built release binary across product help surface."
intent = "release asset smoke"
runner = "ubuntu_24_04"
base_lem = 12
default_pr = false
blocking = true
workflow = ".github/workflows/release.yml"
workflow_name = "Release"
job_name = "Release Validation"
