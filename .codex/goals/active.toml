schema_version = 1

id = "shiplog-swarm-control-plane"
title = "Shiplog swarm development control plane"
status = "active"
owner = "codex"
created = "2026-05-22"

objective = """
Keep normal shiplog development moving through EffortlessMetrics/shiplog-swarm
while EffortlessMetrics/shiplog remains the release/public source surface.
Use focused swarm PRs, green normalized CI, regular merge-commit promotions,
and repo-native receipts so the next agent can continue without chat memory.
"""

end_state = [
  "Normal development targets EffortlessMetrics/shiplog-swarm.",
  "Swarm PRs stay focused, validated, squash-merged, and cleaned up.",
  "Shiplog Rust Small Result remains the normalized swarm gate.",
  "EffortlessMetrics/shiplog receives proven swarm work by regular merge-commit promotion PRs.",
  "Release authority stays on EffortlessMetrics/shiplog until an explicit release cutover.",
  "Source-of-truth goals, plans, support tiers, and promotion receipts stay current.",
]

