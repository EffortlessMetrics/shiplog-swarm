schema_version = 1

id = "shiplog-swarm-control-plane"
title = "Shiplog swarm development control plane"
status = "active"
owner = "codex"
created = "2026-05-22"

objective = """
Keep normal shiplog development moving through EffortlessMetrics/shiplog-swarm
while EffortlessMetrics/shiplog remains the release/public source surface.
Use focused swarm PRs, green normalized CI, regular merge-commit promotions,
and repo-native receipts so the next agent can continue without chat memory.
"""

end_state = [
  "Normal development targets EffortlessMetrics/shiplog-swarm.",
  "Swarm PRs stay focused, validated, squash-merged, and cleaned up.",
  "Shiplog Rust Small Result remains the normalized swarm gate.",
  "EffortlessMetrics/shiplog receives proven swarm work by regular merge-commit promotion PRs.",
  "Release authority stays on EffortlessMetrics/shiplog until an explicit release cutover.",
  "Source-of-truth goals, plans, support tiers, and promotion receipts stay current.",
]

[[work_item]]
id = "promotion-cadence"
status = "active"
proposal = "SHIPLOG-PROP-0010"
spec = "SHIPLOG-SPEC-0011"
adr = "SHIPLOG-ADR-0011"
plan = "plans/shiplog-swarm/implementation-plan.md"
commands = [
  "rtk git fetch origin --prune",
  "rtk git fetch swarm --prune",
  "rtk git merge-base origin/main swarm/main",
  "rtk git log --oneline origin/main..swarm/main",
  "rtk cargo xtask promotion-state --check",
  "rtk cargo xtask repo-contract-report",
  "rtk git diff --check",
]

# Current promotion state is owned by the single bounded manifest
# plans/shiplog-swarm/promotion-state.toml (generated view:
# plans/shiplog-swarm/current-promotion.md). Historical promotion receipts
# remain in plans/shiplog-swarm/implementation-plan.md and Git history. The
# active goal keeps only the current promotion slice so it stays bounded as
# promotions accumulate.
receipts = [
  "EffortlessMetrics/shiplog-swarm#238",
  "EffortlessMetrics/shiplog#655",
  "EffortlessMetrics/shiplog#656",
]
