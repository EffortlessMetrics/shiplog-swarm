name: BDD Smoke

# Bounded BDD smoke for the PR-fast lane. Hosted-only execution removes
# optional self-hosted admission, so runner_unavailable and disk_guard are not
# terminal states for this lane; product failures remain red.

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: bdd-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        id: setup-checkout
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@master
        id: setup-toolchain
        if: steps.setup-checkout.outcome == 'success'
        continue-on-error: true
        with:
          toolchain: "1.95.0"
      - name: Ensure native Rust build dependencies
        id: setup-native-deps
        if: steps.setup-checkout.outcome == 'success' && steps.setup-toolchain.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/native-build-deps
      - uses: Swatinem/rust-cache@v2
        id: setup-cache
        if: steps.setup-checkout.outcome == 'success' && steps.setup-toolchain.outcome == 'success' && steps.setup-native-deps.outcome == 'success'
        continue-on-error: true
        with:
          shared-key: bdd-smoke
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Critical BDD smoke scenarios
        id: smoke-tests
        if: steps.setup-checkout.outcome == 'success' && steps.setup-toolchain.outcome == 'success' && steps.setup-native-deps.outcome == 'success' && steps.setup-cache.outcome == 'success'
        continue-on-error: true
        run: |
          cargo test -p shiplog-testkit --features merge_pipeline bdd_v03x_tests::v03x_tests::multi_source_merging_scenario_7_10_pipeline_contract -- --exact --nocapture
          cargo test -p shiplog-testkit --features merge_pipeline bdd_v03x_tests::v03x_tests::multi_source_merging_scenario_7_8_render -- --exact --nocapture
      - name: Auxiliary smoke execution summary
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.smoke-tests.outcome }}
          SETUP_STATUS: ${{ join(steps.*.outcome, ',') }}
        run: |
          terminal="ok"
          if [[ "$SETUP_STATUS" == *failure* ]] && [ "$TEST_STATUS" = "skipped" ]; then terminal="setup_failed";
          elif [ "$TEST_STATUS" = "failure" ]; then terminal="test_failed";
          elif [ "$TEST_STATUS" = "cancelled" ]; then terminal="cancelled_as_superseded";
          elif [ "$TEST_STATUS" = "skipped" ]; then terminal="setup_failed"; fi
          {
            echo "## Auxiliary lane summary (bdd-smoke)"
            echo "- lane: bdd-smoke"
            echo "- executed_runner: github-hosted"
            echo "- fallback_used: false"
            echo "- fallback_reason: not_applicable"
            echo "- normalized_terminal: $terminal"
            echo "- test_step_outcome: $TEST_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$terminal" = "setup_failed" ] || [ "$terminal" = "test_failed" ]; then exit 1; fi
