name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

concurrency:
  group: droid-tag-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  droid:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@droid') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@droid') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@droid') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (contains(github.event.pull_request.body, '@droid') || contains(github.event.pull_request.title, '@droid')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
      )
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ""
      ANTHROPIC_BASE_URL: ""
    steps:
      - name: Skip when Droid secrets are unavailable
        if: env.FACTORY_API_KEY == '' || env.MINIMAX_API_KEY == ''
        run: echo "FACTORY_API_KEY or MINIMAX_API_KEY is not configured; skipping Droid request."

      - name: Checkout repository
        if: env.FACTORY_API_KEY != '' && env.MINIMAX_API_KEY != ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Configure MiniMax M3 for Droid BYOK
        if: env.FACTORY_API_KEY != '' && env.MINIMAX_API_KEY != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.factory"
          cat > "$HOME/.factory/settings.json" <<JSON
          {
            "customModels": [
              {
                "model": "MiniMax-M3",
                "displayName": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX_API_KEY}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

      - name: Run Droid Exec with MiniMax M3 BYOK
        if: env.FACTORY_API_KEY != '' && env.MINIMAX_API_KEY != ''
        continue-on-error: true
        uses: EffortlessMetrics/droid-action-safe@7c1377ccbacddc95560d1570547a5baa51de01ec # safe pinned Droid action; raw debug artifact upload disabled
        with:
          factory_api_key: ${{ env.FACTORY_API_KEY }}
          upload_debug_artifacts: false

          review_depth: shallow
          review_model: "custom:MiniMax-M3-0"
          security_model: "custom:MiniMax-M3-0"
          show_full_output: false
