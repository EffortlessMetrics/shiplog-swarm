name: PR Plan

# Advisory hosted-only PR plan. Optional self-hosted admission was removed, so
# runner_unavailable and disk_guard cannot obscure the plan result.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  forecast:
    name: forecast
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        id: setup-checkout
        continue-on-error: true
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        id: setup-toolchain
        if: steps.setup-checkout.outcome == 'success'
        continue-on-error: true
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        id: setup-cache
        if: steps.setup-toolchain.outcome == 'success'
        continue-on-error: true
        with:
          shared-key: pr-plan
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Resolve PR metadata
        id: meta
        if: steps.setup-cache.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "labels=${{ join(github.event.pull_request.labels.*.name, ',') }}" >> "$GITHUB_OUTPUT"
      - name: Run PR plan
        id: plan
        if: steps.setup-cache.outcome == 'success' && (github.event_name != 'pull_request' || steps.meta.outcome == 'success')
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export GITHUB_BASE_SHA="${{ steps.meta.outputs.base_sha }}"
            export GITHUB_HEAD_SHA="${{ steps.meta.outputs.head_sha }}"
            export GITHUB_PR_NUMBER="${{ steps.meta.outputs.pr_number }}"
            export GITHUB_PR_LABELS="${{ steps.meta.outputs.labels }}"
          fi
          mkdir -p target/ci
          cargo xtask ci plan --output target/ci/ci-plan.json
      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-plan
          path: target/ci/ci-plan.json
          retention-days: 30
          if-no-files-found: warn
      - name: Auxiliary plan execution summary
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.plan.outcome }}
          SETUP_STATUS: ${{ join(steps.*.outcome, ',') }}
        run: |
          terminal="ok"
          if [[ "$SETUP_STATUS" == *failure* ]] && [ "$TEST_STATUS" = "skipped" ]; then terminal="setup_failed";
          elif [ "$TEST_STATUS" = "failure" ]; then terminal="test_failed";
          elif [ "$TEST_STATUS" = "cancelled" ]; then terminal="cancelled_as_superseded";
          elif [ "$TEST_STATUS" = "skipped" ]; then terminal="setup_failed"; fi
          {
            echo "## Auxiliary lane summary (pr-plan)"
            echo "- lane: pr-plan"
            echo "- executed_runner: github-hosted"
            echo "- fallback_used: false"
            echo "- fallback_reason: not_applicable"
            echo "- normalized_terminal: $terminal"
            echo "- test_step_outcome: $TEST_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$terminal" = "setup_failed" ] || [ "$terminal" = "test_failed" ]; then exit 1; fi
