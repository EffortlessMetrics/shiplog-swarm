name: Security Checks

# Standalone cargo-deny (lane.ci_security). PR coverage is provided by
# `ci.yml#cargo-deny` (lane.ci_deny, blocking, runs on every PR).
# Routed in PR #155 to remove the duplicate PR fire; this workflow now
# runs on push-to-main + weekly cron + manual dispatch + label-only PR.
#
# To run on a PR ad-hoc, add the `security-audit` or `full-ci` label.

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize, reopened]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

jobs:
  cargo-deny:
    name: Cargo Deny Security
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'security-audit') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check for security vulnerabilities
        run: cargo deny check advisories

      - name: Check for invalid licenses
        run: cargo deny check licenses

      - name: Check for unmaintained dependencies
        run: cargo deny check bans

      - name: Check sources
        run: cargo deny check sources
