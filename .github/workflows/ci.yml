name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    name: Check (${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && matrix.os || 'ubuntu-latest' }})
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && matrix.os || 'ubuntu-latest' }}
    strategy:
      matrix:
        os: [self-hosted]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "check-${{ matrix.os }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Package boundary audit
        if: matrix.os == 'self-hosted'
        run: scripts/package-boundary-audit.sh

      - name: Check formatting
        if: matrix.os == 'self-hosted'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features --locked

      - name: Doc-tests
        run: cargo test --doc --workspace --all-features --locked

      - name: Build docs
        if: matrix.os == 'self-hosted'
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Build release
        run: cargo build --workspace --release --locked

      - name: Publish dry-run (canary)
        if: matrix.os == 'self-hosted'
        run: scripts/publish-dry-run.sh

  deny:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    name: cargo-deny
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "deny"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny check
        run: cargo deny check

  policy:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    name: Policy gates
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "policy"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: check-policy-ledgers
        run: cargo xtask check-policy-ledgers

      - name: check-doc-artifacts
        run: cargo xtask check-doc-artifacts

      - name: check-goals
        run: cargo xtask check-goals

      - name: check-support-tiers
        run: cargo xtask check-support-tiers

      - name: check-lint-policy (blocking)
        run: cargo xtask check-lint-policy --mode blocking-allowlist

      - name: check-clippy-exceptions (blocking)
        run: cargo xtask check-clippy-exceptions --mode blocking-allowlist

      - name: check-no-panic-family (blocking)
        run: cargo xtask check-no-panic-family --mode blocking-allowlist

      - name: Install cargo-allow
        run: cargo install --git https://github.com/EffortlessMetrics/cargo-allow --rev 454928e73f6437beaac640f7068e27ea77a95a83 --locked cargo-allow

      - name: cargo-allow non-Rust policy (blocking)
        run: cargo allow check --compat --kind non-rust --mode no-new --format markdown --output target/cargo-allow/non-rust-compat.md

      - name: check-generated (blocking)
        run: cargo xtask check-generated --mode blocking-allowlist

      - name: check-executable-files (blocking)
        run: cargo xtask check-executable-files --mode blocking-allowlist

      - name: check-workflows (blocking)
        run: cargo xtask check-workflows --mode blocking-allowlist

      - name: check-dependency-surfaces (blocking)
        run: cargo xtask check-dependency-surfaces --mode blocking-allowlist

      - name: check-process-policy (blocking)
        run: cargo xtask check-process-policy --mode blocking-allowlist

      - name: check-network-policy (blocking)
        run: cargo xtask check-network-policy --mode blocking-allowlist

      - name: check-label-enforcement (blocking)
        run: cargo xtask check-label-enforcement --mode blocking-allowlist

      - name: check-risk-pack-integrity (blocking)
        run: cargo xtask check-risk-pack-integrity --mode blocking-allowlist

      - name: check-lane-mappings (blocking)
        run: cargo xtask check-lane-mappings --mode blocking-allowlist

      - name: check-actuals-coverage (blocking)
        run: cargo xtask check-actuals-coverage --mode blocking-allowlist
