name: Property Testing

# Broad property sweep (lane.property, 256 cases × 13 crates). Routed in
# PR #155 to label-gated PR + nightly + main only; the bounded smoke
# (lane.property_smoke, .github/workflows/property-smoke.yml) runs on
# every PR-fast at 64 cases against the foundation modules.
#
# Triggers:
#   - push to main: full sweep
#   - PR with `property-tests` or `full-ci` label: full sweep
#   - nightly cron: full sweep
#   - manual dispatch
#
# Job-level `if` guards label-gated PR runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: property-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always
  PROPTEST_CASES: "256"
  PROPTEST_MAX_LOCAL_REJECTS: "10000"
  PROPTEST_MAX_GLOBAL_REJECTS: "100000"

jobs:
  property-test:
    name: Property Testing
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'property-tests') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Ensure native Rust build dependencies
        uses: ./.github/actions/native-build-deps

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: property
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run property tests
        run: |
          echo "Running property tests for all crates..."
          cargo test --workspace --all-features -- --test-threads=4

      - name: Run property tests for shiplog ids module
        run: cargo test -p shiplog --test ids -- --test-threads=4

      - name: Run property tests for shiplog schema module
        run: cargo test -p shiplog --test schema -- --test-threads=4

      - name: Run property tests for shiplog redaction module
        run: cargo test -p shiplog --test redact -- --test-threads=4

      - name: Run property tests for shiplog coverage module
        run: cargo test -p shiplog --test coverage_property -- --test-threads=4

      - name: Run property tests for shiplog workstreams module
        run: cargo test -p shiplog --test workstreams -- --test-threads=4

      - name: Run cache tests for shiplog cache module
        run: |
          cargo test -p shiplog --test cache -- --test-threads=4
          cargo test -p shiplog --test cache_expiry -- --test-threads=4

      - name: Run property tests for shiplog bundle module
        run: cargo test -p shiplog --test bundle -- --test-threads=4

      - name: Run property tests for shiplog engine module
        run: cargo test -p shiplog --test engine_property -- --test-threads=4

      - name: Run property tests for shiplog manual ingest module
        run: cargo test -p shiplog --test ingest_manual_property -- --test-threads=4

      - name: Run property tests for shiplog Markdown render module
        run: cargo test -p shiplog --test render_md -- --test-threads=4

      - name: Run property tests for shiplog JSON artifact writer
        run: cargo test -p shiplog --test render_json -- --test-threads=4

      - name: Run property tests for shiplog cluster_llm module
        run: cargo test -p shiplog --features llm --test cluster_llm -- --test-threads=4

      - name: Run property tests for shiplog-testkit (roadmap)
        run: cargo test -p shiplog-testkit roadmap_property_tests -- --test-threads=4

      - name: Generate property test summary
        if: always()
        run: |
          echo "# Property Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Property-based tests completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Tested Crates" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::ids" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::schema" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::redact" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::coverage" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::workstreams" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::cache" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::bundle" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::engine" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::ingest::manual" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog render::md module" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::engine artifact_json module" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog::cluster_llm" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-testkit (roadmap property tests)" >> $GITHUB_STEP_SUMMARY
