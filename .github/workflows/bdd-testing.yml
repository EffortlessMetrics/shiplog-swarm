name: BDD Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    # Docs-only PRs do not need to compile + run BDD; they are reported as
    # skipped-by-policy in the PR plan (see docs/ci/skipped-by-policy.md).
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

env:
  CARGO_TERM_COLOR: always

jobs:
  bdd-test:
    name: BDD & Property Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-testkit
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run v0.3.x BDD Tests
        run: cargo test -p shiplog-testkit bdd_v03x_tests -- --test-threads=4

      - name: Run Later BDD Tests
        run: cargo test -p shiplog-testkit bdd_later_tests -- --test-threads=4

      - name: Run Later Team BDD Tests
        run: cargo test -p shiplog-testkit --features team team_aggregation -- --test-threads=4

      - name: Run Merge Pipeline BDD Contract
        run: cargo test -p shiplog-testkit --features merge_pipeline multi_source_merging_scenario_7_10_pipeline_contract -- --test-threads=4

      - name: Run Roadmap Property Tests
        run: cargo test -p shiplog-testkit roadmap_property -- --test-threads=4

      - name: Generate test summary
        if: always()
        run: |
          echo "# BDD & Property Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "BDD and property-based tests completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- v0.3.x BDD scenarios" >> $GITHUB_STEP_SUMMARY
          echo "- Later BDD scenarios" >> $GITHUB_STEP_SUMMARY
          echo "- Later team BDD scenarios with --features team" >> $GITHUB_STEP_SUMMARY
          echo "- Merge pipeline contract scenario with --features merge_pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Roadmap property tests" >> $GITHUB_STEP_SUMMARY

  ingest-tests:
    name: Ingest Crate Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-ingest
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test ingest crates
        run: cargo test -p shiplog-ingest-gitlab -p shiplog-ingest-jira -p shiplog-ingest-linear -p shiplog-ingest-github -p shiplog-ingest-git -p shiplog-ingest-manual -p shiplog-ingest-json -- --test-threads=4

  render-and-trust-tests:
    name: Render, Trust, and Contract Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-render-trust
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test stable contracts and trust surfaces
        run: cargo test -p shiplog-ids -p shiplog-schema -p shiplog-ports -p shiplog-coverage -p shiplog-cache -p shiplog-workstreams -p shiplog-redact -p shiplog-bundle -p shiplog-render-md -p shiplog-render-json -p shiplog-cluster-llm -- --test-threads=4

  optional-surface-tests:
    name: Optional Surface Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-optional
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test optional surface crates
        run: cargo test -p shiplog-workstreams -p shiplog-team -p shiplog-merge -- --test-threads=4

  app-tests:
    name: App Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-app
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test shiplog app without optional features
        run: cargo test -p shiplog --no-default-features -- --test-threads=4

      - name: Test shiplog app with optional features
        run: cargo test -p shiplog --all-features -- --test-threads=4
