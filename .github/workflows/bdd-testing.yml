name: BDD Testing

# Broad BDD sweep (lane.bdd). Routed in PR #155 to label-gated PR +
# nightly + main only; the bounded smoke (lane.bdd_smoke,
# .github/workflows/bdd-smoke.yml) runs on every PR-fast.
#
# Triggers:
#   - push to main: full sweep
#   - PR with `bdd` or `full-ci` label: full sweep
#   - nightly cron: full sweep
#   - manual dispatch
#
# Job-level `if` guards label-gated PR runs so synchronizing an unlabeled
# PR doesn't burn LEM.

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: bdd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  bdd-test:
    name: BDD & Property Tests
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'bdd') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-testkit
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run v0.3.x BDD Tests
        run: cargo test -p shiplog-testkit bdd_v03x_tests -- --test-threads=4

      - name: Run Later BDD Tests
        run: cargo test -p shiplog-testkit bdd_later_tests -- --test-threads=4

      - name: Run Later Team BDD Tests
        run: cargo test -p shiplog-testkit --features team team_aggregation -- --test-threads=4

      - name: Run Merge Pipeline BDD Contract
        run: cargo test -p shiplog-testkit --features merge_pipeline multi_source_merging_scenario_7_10_pipeline_contract -- --test-threads=4

      - name: Run Roadmap Property Tests
        run: cargo test -p shiplog-testkit roadmap_property -- --test-threads=4

      - name: Generate test summary
        if: always()
        run: |
          echo "# BDD & Property Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "BDD and property-based tests completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- v0.3.x BDD scenarios" >> $GITHUB_STEP_SUMMARY
          echo "- Later BDD scenarios" >> $GITHUB_STEP_SUMMARY
          echo "- Later team BDD scenarios with --features team" >> $GITHUB_STEP_SUMMARY
          echo "- Merge pipeline contract scenario with --features merge_pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- Roadmap property tests" >> $GITHUB_STEP_SUMMARY

  ingest-tests:
    name: Ingest Crate Tests
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'bdd') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-ingest
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test ingest crates
        run: |
          cargo test -p shiplog --test ingest_gitlab -- --test-threads=4
          cargo test -p shiplog --test ingest_jira -- --test-threads=4
          cargo test -p shiplog --test ingest_linear -- --test-threads=4
          cargo test -p shiplog --test ingest_github_integration -- --test-threads=4
          cargo test -p shiplog --test ingest_git -- --test-threads=4
          cargo test -p shiplog --test ingest_manual_integration -- --test-threads=4
          cargo test -p shiplog --test ingest_json -- --test-threads=4

  render-and-trust-tests:
    name: Render, Trust, and Contract Crates
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'bdd') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-render-trust
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test stable contracts and trust surfaces
        run: |
          cargo test -p shiplog-ids -p shiplog-schema -p shiplog-ports -p shiplog-workstreams -p shiplog-redact -p shiplog-bundle -p shiplog-engine -p shiplog-cluster-llm -- --test-threads=4
          cargo test -p shiplog --test coverage_integration -- --test-threads=4
          cargo test -p shiplog --test cache -- --test-threads=4
          cargo test -p shiplog --test cache_expiry -- --test-threads=4

  optional-surface-tests:
    name: Optional Surface Tests
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'bdd') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-optional
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test optional surface crates
        run: cargo test -p shiplog-workstreams -p shiplog-team -p shiplog-merge -- --test-threads=4

  app-tests:
    name: App Tests
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'bdd') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bdd-app
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test shiplog app without optional features
        run: cargo test -p shiplog --no-default-features -- --test-threads=4

      - name: Test shiplog app with optional features
        run: cargo test -p shiplog --all-features -- --test-threads=4
