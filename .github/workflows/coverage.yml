name: Coverage

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**"
      - "crates/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/coverage.yml"
      - "codecov.yml"
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/**"
      - "crates/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/coverage.yml"
      - "codecov.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  coverage:
    name: Codecov Coverage
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 45

    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: llvm-tools-preview

      - name: Ensure native Rust build dependencies
        uses: ./.github/actions/native-build-deps

      - name: Use larger target dir
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/target" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-directories: ${{ runner.temp }}/target
          shared-key: coverage-1.95
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install coverage tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage
        env:
          CI: true
        run: |
          set -euo pipefail
          cargo llvm-cov clean --workspace

          cargo llvm-cov nextest \
            --workspace \
            --exclude shiplog-testkit \
            --locked \
            --all-features \
            --no-report

          cargo llvm-cov report --json --output-path coverage.json
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --text | tee coverage.txt

      - name: Validate coverage output
        run: |
          set -euo pipefail
          test -s coverage.json
          test -s coverage.txt
          test -s lcov.info

      - name: Detect Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov (main)
        if: ${{ always() && github.event_name == 'push' && hashFiles('lcov.info') != '' && steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust-core
          name: shiplog-rust-core
          fail_ci_if_error: true

      - name: Upload coverage to Codecov (advisory)
        if: ${{ always() && github.event_name != 'push' && hashFiles('lcov.info') != '' && steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust-core
          name: shiplog-rust-core
          fail_ci_if_error: false

      - name: Write coverage receipt
        if: always()
        run: |
          mkdir -p target/coverage
          python3 - <<'PY'
          import json
          import pathlib

          receipt = {
              "schema_version": 1,
              "repo": "shiplog",
              "lane": "coverage",
              "flag": "rust-core",
              "workflow": "Coverage",
              "artifacts": {
                  "coverage_json": pathlib.Path("coverage.json").exists(),
                  "coverage_text": pathlib.Path("coverage.txt").exists(),
                  "lcov": pathlib.Path("lcov.info").exists(),
              },
              "claim_boundary": [
                  "execution_surface_only",
                  "not_shiplog_coverage_manifest",
                  "not_packet_quality",
                  "not_redaction_safety",
                  "not_source_adapter_completeness",
                  "not_mutation_adequacy",
                  "not_publish_readiness"
              ],
          }

          pathlib.Path("target/coverage/coverage-receipt.json").write_text(
              json.dumps(receipt, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.txt
            lcov.info
            target/coverage/coverage-receipt.json
          retention-days: 14
