name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing semver tag to release, e.g. v0.8.1"
        required: true
        type: string
      owner_approved_release_execution:
        description: "Owner explicitly approved release execution"
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Prove the package surface before building release assets
  release-preflight:
    name: Release Preflight
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    outputs:
      release_tag: ${{ steps.release_tag.outputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_OWNER_APPROVED: ${{ inputs.owner_approved_release_execution }}
        run: |
          set -euo pipefail

          tag="$REF_NAME"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_OWNER_APPROVED" != "true" ]]; then
              echo "manual release workflow dispatch requires owner approval" >&2
              exit 1
            fi
            tag="$INPUT_RELEASE_TAG"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release workflow requires an explicit semver tag like v0.8.1; got '$tag'" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Release hold guard
        run: bash scripts/check-release-hold.sh "${{ steps.release_tag.outputs.release_tag }}"

      - name: Checkout manual dispatch tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --depth=1 origin "refs/tags/${{ steps.release_tag.outputs.release_tag }}:refs/tags/${{ steps.release_tag.outputs.release_tag }}"
          git checkout --detach "${{ steps.release_tag.outputs.release_tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-preflight"

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Package proof
        run: ./scripts/package-proof.sh

      - name: Publish dry run (allowlist)
        run: scripts/publish-dry-run.sh

  # Build binaries for all platforms
  build-binary:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: release-preflight
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - os: macos-15-intel
            target: x86_64-apple-darwin
            ext: ''
          - os: macos-15
            target: aarch64-apple-darwin
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v6
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p shiplog --locked

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/shiplog${{ matrix.ext }}"
          dest="dist/shiplog-${{ matrix.target }}${{ matrix.ext }}"
          if [[ ! -f "$src" ]]; then
            echo "missing expected binary: $src" >&2
            find target -maxdepth 4 -type f -name 'shiplog*' -print >&2 || true
            exit 1
          fi
          cp "$src" "$dest"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: shiplog-${{ matrix.target }}
          path: dist/shiplog-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 5

  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    needs: [release-preflight, build-binary]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.release_tag }}

      - name: Extract version
        id: version
        run: |
          VERSION=${{ needs.release-preflight.outputs.release_tag }}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-preflight.outputs.release_tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Upload binaries to release
  upload-assets:
    name: Upload Assets
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    needs: [release-preflight, build-binary, create-release]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -maxdepth 2 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-preflight.outputs.release_tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            artifacts/shiplog-x86_64-unknown-linux-gnu/shiplog-x86_64-unknown-linux-gnu
            artifacts/shiplog-x86_64-apple-darwin/shiplog-x86_64-apple-darwin
            artifacts/shiplog-aarch64-apple-darwin/shiplog-aarch64-apple-darwin
            artifacts/shiplog-x86_64-pc-windows-msvc/shiplog-x86_64-pc-windows-msvc.exe
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Validate the release
  release-validation:
    name: Release Validation
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    needs: [release-preflight, build-binary, create-release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v8
        with:
          name: shiplog-x86_64-unknown-linux-gnu
          path: artifacts/shiplog-x86_64-unknown-linux-gnu

      - name: Smoke downloaded Linux artifact
        run: |
          chmod +x artifacts/shiplog-x86_64-unknown-linux-gnu/shiplog-x86_64-unknown-linux-gnu
          artifacts/shiplog-x86_64-unknown-linux-gnu/shiplog-x86_64-unknown-linux-gnu --help
          artifacts/shiplog-x86_64-unknown-linux-gnu/shiplog-x86_64-unknown-linux-gnu --version
          artifacts/shiplog-x86_64-unknown-linux-gnu/shiplog-x86_64-unknown-linux-gnu collect --help
          artifacts/shiplog-x86_64-unknown-linux-gnu/shiplog-x86_64-unknown-linux-gnu render --help

      - name: Build release
        run: cargo build --release -p shiplog --locked

      - name: Run smoke tests
        run: |
          echo "Testing --help..."
          ./target/release/shiplog --help

          echo "Testing --version..."
          ./target/release/shiplog --version

          echo "Testing help subcommand..."
          ./target/release/shiplog help

          echo "Testing product command help..."
          ./target/release/shiplog init --help
          ./target/release/shiplog doctor --help
          ./target/release/shiplog config --help
          ./target/release/shiplog collect --help
          ./target/release/shiplog collect github --help
          ./target/release/shiplog collect gitlab --help
          ./target/release/shiplog collect jira --help
          ./target/release/shiplog collect linear --help
          ./target/release/shiplog collect multi --help
          ./target/release/shiplog workstreams --help
          ./target/release/shiplog render --help
          ./target/release/shiplog cache --help
          ./target/release/shiplog runs --help
          ./target/release/shiplog open --help

      - name: Check versionless installers
        shell: bash
        run: |
          bash -n scripts/install.sh
          scripts/install.sh --help
          cargo metadata --no-deps --format-version 1 >/dev/null
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -Command '$null = [scriptblock]::Create((Get-Content scripts/install.ps1 -Raw))'
            pwsh -NoProfile -File scripts/install.ps1 --help
          fi

      - name: Generate validation summary
        run: |
          echo "# Release Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Release build: **SUCCESS**" >> $GITHUB_STEP_SUMMARY
          echo "- Multi-platform builds: **SUCCESS** (Linux x86_64, macOS x86_64, macOS ARM64, Windows x86_64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Downloaded Linux artifact help/version: **PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "- Downloaded Linux artifact collect/render help: **PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "- Help command: **PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "- Version command: **PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "- Help subcommand: **PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "- Product command help: **PASSED**" >> $GITHUB_STEP_SUMMARY

  # Prove the published binaries from the outside on every supported target.
  release-binary-acceptance:
    name: First-use ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: [release-preflight, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            shell: bash
          - name: macOS Intel
            os: macos-15-intel
            shell: bash
          - name: macOS Apple Silicon
            os: macos-15
            shell: bash
          - name: Windows x86_64
            os: windows-latest
            shell: pwsh

    steps:
      - name: Checkout release scripts
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.release_tag }}

      - name: Run published-binary first-use acceptance
        shell: ${{ matrix.shell }}
        env:
          SHIPLOG_RELEASE_REPO: ${{ github.repository }}
        run: |
          ${{ matrix.shell == 'pwsh' && 'pwsh -NoProfile -File scripts/release-install-smoke.ps1' || 'bash scripts/release-install-smoke.sh' }} "${{ needs.release-preflight.outputs.release_tag }}"

  # Run integration tests
  release-test:
    name: Release Integration Tests
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    needs: [release-preflight, build-binary, create-release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Cache cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run release tests
        run: cargo test --release --workspace --exclude shiplog-testkit --locked

      - name: Generate test summary
        if: always()
        run: |
          echo "# Release Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All integration tests passed in release mode!" >> $GITHUB_STEP_SUMMARY
