name: One-time shiplog-swarm history import

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-shiplog-swarm-history-import
  cancel-in-progress: false

jobs:
  import-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the merged bootstrap commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Create the history-preserving merge commit
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "EffortlessSteven"
          git config user.email "git@effortlesssteven.com"

          git remote add swarm https://github.com/EffortlessMetrics/shiplog-swarm.git
          git fetch --no-tags swarm main

          git checkout -B sync/history-preserving-shiplog-swarm-20260712 "${GITHUB_SHA}"

          if git merge-base --is-ancestor swarm/main HEAD; then
            echo "shiplog-swarm/main is already contained in shiplog/main"
            git rm .github/workflows/history-sync-import-swarm.yml
            git commit -m "ci(sync): remove completed history-import bootstrap [skip ci]"
          else
            swarm_sha="$(git rev-parse swarm/main)"
            git merge \
              --no-ff \
              --no-commit \
              --allow-unrelated-histories \
              -s ours \
              swarm/main
            git rm .github/workflows/history-sync-import-swarm.yml
            git commit -m "merge(sync): join shiplog-swarm history through ${swarm_sha:0:12}

Preserve the released shiplog tree while recording shiplog-swarm/main as the second parent. Remove the one-time import workflow in the same commit so the resulting tree matches the pre-bootstrap source tree.

[skip ci]"
          fi

          git push origin HEAD:refs/heads/sync/history-preserving-shiplog-swarm-20260712
          git push origin --delete agent/history-sync-import-swarm-20260712 || true
