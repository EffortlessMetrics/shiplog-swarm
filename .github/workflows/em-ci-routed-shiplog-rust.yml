name: EM CI Routed Shiplog Rust

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:
    inputs:
      force_route:
        description: Force one route for proof runs.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - cpx42
          - cx43
          - cx53
          - github

concurrency:
  group: shiplog-rust-small-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  route:
    name: Route Shiplog Rust Small
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target: ${{ steps.pick.outputs.target }}
      reason: ${{ steps.pick.outputs.reason }}
      trusted: ${{ steps.pick.outputs.trusted }}
      fallback_allowed: ${{ steps.pick.outputs.fallback_allowed }}
    steps:
      - name: Pick route
        id: pick
        env:
          FORCE_ROUTE: ${{ github.event.inputs.force_route || 'auto' }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = os.environ["GITHUB_EVENT_PATH"]
          force_route = os.environ.get("FORCE_ROUTE", "auto").strip().lower() or "auto"
          github_token = os.environ.get("GITHUB_TOKEN", "")
          runner_read_token = os.environ.get("GH_TOKEN", "")
          org = os.environ.get("ORG", "EffortlessMetrics")
          route_order = ["cpx42", "cx43", "cx53"]

          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)
          labels = {
              label.get("name", "").lower()
              for label in event.get("pull_request", {}).get("labels", [])
              if isinstance(label, dict)
          }
          source_repo_release_surface = repo == "EffortlessMetrics/shiplog"
          non_pr_event = event_name != "pull_request"

          def request_json(url, bearer_token):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {bearer_token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=10) as response:
                  return json.load(response)

          def source_branch_matches(head_ref, head_sha):
              if not github_token or not head_ref or not head_sha:
                  return False
              encoded_ref = urllib.parse.quote(head_ref, safe="")
              try:
                  branch = request_json(
                      f"https://api.github.com/repos/{repo}/branches/{encoded_ref}",
                      github_token,
                  )
              except (urllib.error.URLError, TimeoutError, OSError, json.JSONDecodeError) as exc:
                  print(f"head_branch_probe_error={exc}")
                  return False
              return branch.get("commit", {}).get("sha") == head_sha

          trusted = event_name in {"push", "workflow_dispatch", "merge_group"}
          if event_name == "pull_request":
              pull_request = event.get("pull_request", {})
              head = pull_request.get("head", {})
              head_repo_obj = head.get("repo")
              head_repo = head_repo_obj.get("full_name") if isinstance(head_repo_obj, dict) else None
              trusted = head_repo == repo
              if not trusted and head_repo is None:
                  trusted = source_branch_matches(head.get("ref"), head.get("sha"))

          fallback_allowed = (
              trusted
              or source_repo_release_surface
              or non_pr_event
              or "allow-github-hosted" in labels
              or "ci-budget-ack" in labels
          )

          def set_output(target, reason):
              output_path = os.environ["GITHUB_OUTPUT"]
              with open(output_path, "a", encoding="utf-8") as out:
                  out.write(f"target={target}\n")
                  out.write(f"reason={reason}\n")
                  out.write(f"trusted={str(trusted).lower()}\n")
                  out.write(f"fallback_allowed={str(fallback_allowed).lower()}\n")
              print(f"repo={repo}")
              print("workflow=EM CI Routed Shiplog Rust")
              print(f"run_id={os.environ['GITHUB_RUN_ID']}")
              print(f"router_target={target}")
              print(f"router_reason={reason}")
              print(f"trusted={str(trusted).lower()}")

          def set_unavailable(reason):
              if fallback_allowed:
                  set_output("github", f"{reason}_fallback_allowed")
              else:
                  set_output("none", reason)

          if not trusted:
              set_output("github", "fork_pr")
              sys.exit(0)

          if force_route == "github":
              set_output("github", "forced_github")
              sys.exit(0)

          if force_route in route_order:
              set_output(force_route, f"forced_{force_route}")
              sys.exit(0)

          if force_route != "auto":
              set_output("github", f"unknown_forced_route_{force_route}")
              sys.exit(0)

          if not runner_read_token:
              set_unavailable("runner_token_missing")
              sys.exit(0)

          try:
              payload = request_json(
                  f"https://api.github.com/orgs/{org}/actions/runners?per_page=100",
                  runner_read_token,
              )
          except urllib.error.HTTPError as exc:
              print(f"runner_api_http_error={exc.code}")
              if exc.code == 401:
                  set_unavailable("runner_token_unauthorized")
              elif exc.code == 403:
                  set_unavailable("runner_token_forbidden")
              else:
                  set_unavailable("runner_api_failed")
              sys.exit(0)
          except (urllib.error.URLError, TimeoutError, OSError, json.JSONDecodeError) as exc:
              print(f"runner_api_error={exc}")
              set_unavailable("runner_api_failed")
              sys.exit(0)

          runners = payload.get("runners", [])
          required_labels = {
              "cpx42": {"self-hosted", "linux", "x64", "em-ci", "cpx42", "rust-16gb", "rust-medium", "trusted-pr"},
              "cx43": {"self-hosted", "linux", "x64", "em-ci", "cx43", "rust-small", "trusted-pr"},
              "cx53": {"self-hosted", "linux", "x64", "em-ci", "cx53", "rust-small", "trusted-pr"},
          }

          if not isinstance(runners, list):
              set_unavailable("parse_failed")
              sys.exit(0)

          for target in route_order:
              required = required_labels[target]
              for runner in runners:
                  labels = {
                      str(label.get("name", "")).lower()
                      for label in runner.get("labels", [])
                  }
                  if (
                      runner.get("status") == "online"
                      and not runner.get("busy", False)
                      and required.issubset(labels)
                  ):
                      set_output(target, f"{target}_idle")
                      sys.exit(0)

          set_unavailable("no_idle_runner")
          PY

  rust_small_cpx42:
    name: Shiplog Rust Small on CPX42
    needs: [route]
    if: needs.route.outputs.target == 'cpx42'
    outputs:
      fallback_reason: ${{ steps.prepare.outputs.fallback_reason }}
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cpx42, rust-16gb, rust-medium, trusted-pr]
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: "7"
      CARGO_INCREMENTAL: "0"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Prepare CPX42 scratch
        id: prepare
        run: |
          set -euo pipefail
          if ! ci-disk-guard /mnt/ci-scratch 45; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          if ! ci-disk-guard /mnt/ci-cache 10; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR"

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Preflight disk and toolchain
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
          if command -v python3 >/dev/null 2>&1; then python3 --version; fi
          if command -v sccache >/dev/null 2>&1; then sccache --show-stats || true; fi

      - name: Run Shiplog Rust Small checks
        run: |
          set -euo pipefail
          export HOME="$TMPDIR/home"
          export CARGO_HOME="${CARGO_HOME:-/home/gha/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-/home/gha/.rustup}"
          mkdir -p "$HOME"
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked -- --test-threads=4
          cargo xtask check-no-panic-family --mode blocking-allowlist
          git diff --check

      - name: Cleanup and final stats
        if: always()
        run: |
          set +e
          if command -v sccache >/dev/null 2>&1; then sccache --show-stats || true; fi
          rm -rf "$TMPDIR" "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

  rust_small_cx43:
    name: Shiplog Rust Small on CX43
    needs: [route]
    if: needs.route.outputs.target == 'cx43'
    outputs:
      fallback_reason: ${{ steps.prepare.outputs.fallback_reason }}
    runs-on: [self-hosted, Linux, X64, em-ci, rust-small, trusted-pr, cx43]
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: "8"
      CARGO_TARGET_DIR: /mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}/target
      TMPDIR: /mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}/tmp
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Prepare scratch
        id: prepare
        run: |
          if ! ci-disk-guard /mnt/ci-scratch 80; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          if ! ci-disk-guard /mnt/docker 20; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          if ! ci-disk-guard /mnt/ci-cache 20; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          mkdir -p "$CARGO_TARGET_DIR" "$TMPDIR"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "shiplog-rust-small-cx43"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run Shiplog Rust Small checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked -- --test-threads=4
          cargo xtask check-no-panic-family --mode blocking-allowlist
          git diff --check

      - name: Cleanup scratch
        if: always()
        run: rm -rf "/mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}"

  rust_small_cx53:
    name: Shiplog Rust Small on CX53
    needs: [route]
    if: needs.route.outputs.target == 'cx53'
    outputs:
      fallback_reason: ${{ steps.prepare.outputs.fallback_reason }}
    runs-on: [self-hosted, Linux, X64, em-ci, rust-small, trusted-pr, cx53]
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: "12"
      CARGO_TARGET_DIR: /mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}/target
      TMPDIR: /mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}/tmp
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Prepare scratch
        id: prepare
        run: |
          if ! ci-disk-guard /mnt/ci-scratch 100; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          if ! ci-disk-guard /mnt/docker 20; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          if ! ci-disk-guard /mnt/ci-cache 20; then
            echo "fallback_reason=disk_guard" >> "$GITHUB_OUTPUT"
            exit 75
          fi
          mkdir -p "$CARGO_TARGET_DIR" "$TMPDIR"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "shiplog-rust-small-cx53"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run Shiplog Rust Small checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked -- --test-threads=4
          cargo xtask check-no-panic-family --mode blocking-allowlist
          git diff --check

      - name: Cleanup scratch
        if: always()
        run: rm -rf "/mnt/ci-scratch/shiplog-swarm/${{ github.run_id }}-${{ github.run_attempt }}"

  rust_small_github:
    name: Shiplog Rust Small on GitHub Hosted
    needs: [route]
    if: needs.route.outputs.target == 'github'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Run Shiplog Rust Small checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked -- --test-threads=4
          cargo xtask check-no-panic-family --mode blocking-allowlist
          git diff --check

  rust_small_github_fallback:
    name: Shiplog Rust Small on GitHub Hosted Fallback
    needs:
      - route
      - rust_small_cpx42
      - rust_small_cx43
      - rust_small_cx53
    if: >-
      always() &&
      needs.route.outputs.fallback_allowed == 'true' &&
      (
        (needs.route.outputs.target == 'cpx42' && needs.rust_small_cpx42.outputs.fallback_reason == 'disk_guard') ||
        (needs.route.outputs.target == 'cx43' && needs.rust_small_cx43.outputs.fallback_reason == 'disk_guard') ||
        (needs.route.outputs.target == 'cx53' && needs.rust_small_cx53.outputs.fallback_reason == 'disk_guard')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Run Shiplog Rust Small checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked -- --test-threads=4
          cargo xtask check-no-panic-family --mode blocking-allowlist
          git diff --check

  no_runner_capacity:
    name: Runner capacity/config unavailable
    needs: [route]
    if: needs.route.outputs.target == 'none'
    runs-on: ubuntu-latest
    steps:
      - name: Fail fast when self-hosted routing is unavailable
        run: |
          echo "Self-hosted routing unavailable: ${{ needs.route.outputs.reason }}"
          echo "Use label 'allow-github-hosted' or 'ci-budget-ack' to permit GitHub-hosted fallback."
          exit 1

  result:
    name: Shiplog Rust Small Result
    needs:
      - route
      - rust_small_cpx42
      - rust_small_cx43
      - rust_small_cx53
      - rust_small_github
      - rust_small_github_fallback
      - no_runner_capacity
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Normalize routed result
        env:
          TARGET: ${{ needs.route.outputs.target }}
          REASON: ${{ needs.route.outputs.reason }}
          TRUSTED: ${{ needs.route.outputs.trusted }}
          ROUTE_RESULT: ${{ needs.route.result }}
          CPX42_RESULT: ${{ needs.rust_small_cpx42.result }}
          CX43_RESULT: ${{ needs.rust_small_cx43.result }}
          CX53_RESULT: ${{ needs.rust_small_cx53.result }}
          GITHUB_RESULT: ${{ needs.rust_small_github.result }}
          GITHUB_FALLBACK_RESULT: ${{ needs.rust_small_github_fallback.result }}
          NONE_RESULT: ${{ needs.no_runner_capacity.result }}
        run: |
          python3 <<'PY'
          import os
          import sys

          target = os.environ.get("TARGET", "")
          reason = os.environ.get("REASON", "")
          trusted = os.environ.get("TRUSTED", "")
          route_result = os.environ.get("ROUTE_RESULT", "")
          results = {
              "cpx42": os.environ.get("CPX42_RESULT", ""),
              "cx43": os.environ.get("CX43_RESULT", ""),
              "cx53": os.environ.get("CX53_RESULT", ""),
              "github": os.environ.get("GITHUB_RESULT", ""),
              "github_fallback": os.environ.get("GITHUB_FALLBACK_RESULT", ""),
              "none": os.environ.get("NONE_RESULT", ""),
          }

          fallback_target = {
              "cpx42": "cpx42",
              "cx43": "cx43",
              "cx53": "cx53",
          }
          effective_target = fallback_target.get(target, target)
          if effective_target in fallback_target and results["github_fallback"] == "success":
              effective_target = "github_fallback"
          fallback_used = effective_target == "github_fallback"

          print(f"router_target={target}")
          print(f"router_reason={reason}")
          print(f"trusted={trusted}")
          print(f"repo={os.environ.get('GITHUB_REPOSITORY', '')}")
          print("workflow=EM CI Routed Shiplog Rust")
          print(f"run_id={os.environ.get('GITHUB_RUN_ID', '')}")
          print(f"route_result={route_result}")
          for name, value in results.items():
              print(f"{name}_result={value}")

          if route_result != "success":
              print("Route job did not succeed.")
              sys.exit(1)

          if target not in results:
              print("Route job did not emit a known target.")
              sys.exit(1)

          failures = []
          for name, value in results.items():
              if name == effective_target:
                  if value != "success":
                      failures.append(f"selected {name} job result was {value}")
              elif fallback_used and name == target and value == "failure":
                  continue
              elif value != "skipped":
                  failures.append(f"unselected {name} job result was {value}")

          if failures:
              for failure in failures:
                  print(failure)
              sys.exit(1)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("## Shiplog Rust Small Result\n\n")
                  summary.write(f"- Router target: `{target}`\n")
                  summary.write(f"- Router reason: `{reason}`\n")
                  summary.write(f"- Trusted admission: `{trusted}`\n")
                  for name, value in results.items():
                      summary.write(f"- {name}: `{value}`\n")

          print("Exactly one routed Shiplog Rust Small lane succeeded.")
          PY
