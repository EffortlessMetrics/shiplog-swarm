name: Property Smoke

# Hosted-only bounded property smoke. Optional self-hosted admission was
# removed, so runner_unavailable and disk_guard cannot obscure product signal.

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: property-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always
  PROPTEST_CASES: "64"
  PROPTEST_MAX_LOCAL_REJECTS: "2048"
  PROPTEST_MAX_GLOBAL_REJECTS: "8192"
  PROPTEST_RNG_ALGORITHM: "xorshift"
  PROPTEST_RNG_SEED: "shiplog-pr-fast-v1"

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        id: setup-checkout
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@master
        id: setup-toolchain
        if: steps.setup-checkout.outcome == 'success'
        continue-on-error: true
        with:
          toolchain: "1.95.0"
      - name: Ensure native Rust build dependencies
        id: setup-native-deps
        if: steps.setup-checkout.outcome == 'success' && steps.setup-toolchain.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/native-build-deps
      - uses: Swatinem/rust-cache@v2
        id: setup-cache
        if: steps.setup-checkout.outcome == 'success' && steps.setup-toolchain.outcome == 'success' && steps.setup-native-deps.outcome == 'success'
        continue-on-error: true
        with:
          shared-key: property-smoke
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Foundation property tests (bounded, deterministic)
        id: smoke-tests
        if: steps.setup-checkout.outcome == 'success' && steps.setup-toolchain.outcome == 'success' && steps.setup-native-deps.outcome == 'success' && steps.setup-cache.outcome == 'success'
        continue-on-error: true
        run: |
          cargo test -p shiplog --test ids --test schema -- --test-threads=4
          cargo test -p shiplog --test redact -- --test-threads=4
          cargo test -p shiplog --test coverage_property -- --test-threads=4
      - name: Auxiliary smoke execution summary
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.smoke-tests.outcome }}
          SETUP_STATUS: ${{ join(steps.*.outcome, ',') }}
        run: |
          terminal="ok"
          if [[ "$SETUP_STATUS" == *failure* ]] && [ "$TEST_STATUS" = "skipped" ]; then terminal="setup_failed";
          elif [ "$TEST_STATUS" = "failure" ]; then terminal="test_failed";
          elif [ "$TEST_STATUS" = "cancelled" ]; then terminal="cancelled_as_superseded";
          elif [ "$TEST_STATUS" = "skipped" ]; then terminal="setup_failed"; fi
          {
            echo "## Auxiliary lane summary (property-smoke)"
            echo "- lane: property-smoke"
            echo "- executed_runner: github-hosted"
            echo "- fallback_used: false"
            echo "- fallback_reason: not_applicable"
            echo "- normalized_terminal: $terminal"
            echo "- test_step_outcome: $TEST_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$terminal" = "setup_failed" ] || [ "$terminal" = "test_failed" ]; then exit 1; fi
