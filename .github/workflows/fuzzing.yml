name: Fuzzing

# Broad fuzzing (lane.fuzz_quick = full 9-target × 30s on PR;
# lane.fuzz_extended = nightly 60min × 9 targets). Quick-fuzz routed in
# PR #155 to label-gated PR + nightly + main only; the touched-target
# smoke (lane.fuzz_smoke, .github/workflows/fuzz-smoke.yml) runs on
# every PR-fast for the parser surfaces actually touched by the diff.
# Extended fuzz keeps its existing schedule + dispatch posture.
#
# Quick-fuzz triggers:
#   - push to main: full 9-target sweep
#   - PR with `fuzz` or `full-ci` label: full sweep
#   - nightly cron (existing): extended sweep covers it
#   - manual dispatch

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: fuzzing-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-fuzz:
    name: Quick Fuzz (CI)
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'fuzz') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-20
          components: llvm-tools-preview

      - name: Ensure native Rust build dependencies
        uses: ./.github/actions/native-build-deps

      - name: Cache cargo binaries
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-nightly-2026-05-20
          restore-keys: |
            ${{ runner.os }}-cargo-bin-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            cargo install cargo-fuzz --locked
          fi

      - name: Run quick fuzzing for parse_jsonl
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_jsonl -- -max_total_time=30 -dict=dictionaries/json.dict

      - name: Run quick fuzzing for parse_workstreams
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_workstreams -- -max_total_time=30 -dict=dictionaries/yaml.dict

      - name: Run quick fuzzing for parse_github_api
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_github_api -- -max_total_time=30 -dict=dictionaries/json.dict

      - name: Run quick fuzzing for parse_config
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_config -- -max_total_time=30 -dict=dictionaries/yaml.dict

      - name: Run quick fuzzing for parse_manual_events
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_manual_events -- -max_total_time=30 -dict=dictionaries/yaml.dict

      - name: Run quick fuzzing for parse_gitlab_api
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_gitlab_api -- -max_total_time=30 -dict=dictionaries/json.dict

      - name: Run quick fuzzing for parse_jira_linear_api
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_jira_linear_api -- -max_total_time=30 -dict=dictionaries/json.dict

      - name: Run quick fuzzing for parse_template
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_template -- -max_total_time=30 -dict=dictionaries/yaml.dict

      - name: Run quick fuzzing for parse_plugin_manifest
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run parse_plugin_manifest -- -max_total_time=30 -dict=dictionaries/json.dict

      - name: Upload fuzzing artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzzing-crash-artifacts
          path: |
            fuzz/artifacts/**
          retention-days: 30

  extended-fuzz:
    name: Extended Fuzz (${{ matrix.target }})
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 90
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: parse_jsonl
            dict: json.dict
          - target: parse_workstreams
            dict: yaml.dict
          - target: parse_github_api
            dict: json.dict
          - target: parse_config
            dict: yaml.dict
          - target: parse_manual_events
            dict: yaml.dict
          - target: parse_gitlab_api
            dict: json.dict
          - target: parse_jira_linear_api
            dict: json.dict
          - target: parse_template
            dict: yaml.dict
          - target: parse_plugin_manifest
            dict: json.dict

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-20
          components: llvm-tools-preview

      - name: Ensure native Rust build dependencies
        uses: ./.github/actions/native-build-deps

      - name: Cache cargo binaries
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-nightly-2026-05-20
          restore-keys: |
            ${{ runner.os }}-cargo-bin-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            cargo install cargo-fuzz --locked
          fi

      - name: Run extended fuzzing for ${{ matrix.target }}
        run: |
          cd fuzz
          cargo +nightly-2026-05-20 fuzz run ${{ matrix.target }} -- -max_total_time=3600 -dict=dictionaries/${{ matrix.dict }}

      - name: Upload fuzzing corpus
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzzing-corpus-${{ matrix.target }}
          path: |
            fuzz/corpus/${{ matrix.target }}/**
          retention-days: 30

      - name: Upload fuzzing artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzzing-crash-artifacts-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/**
          retention-days: 30
