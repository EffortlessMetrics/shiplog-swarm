name: Mutation Testing

# Broad mutation sweep (lane.mutation_weekly) + targeted PR opt-in
# (lane.mutation_targeted). PR routing added in PR #155: PRs labeled
# `mutation` or `full-ci` get the full mutation run; otherwise PR
# events are no-ops. Weekly cron + dispatch unchanged.

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: mutation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  mutation-test:
    name: Mutation Testing
    # Long-running baseline signal with known surviving mutants. PR runs
    # require an explicit opt-in label; weekly + dispatch always run.
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'mutation') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutation
          save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests for Tier 1 crates
        id: tier1
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 1: stable contracts and trust surfaces..."
          run_mutants_keepalive () {
            local crate="$1"
            local timeout="$2"

            echo "Running cargo mutants for ${crate} (timeout=${timeout}s)..."
            cargo mutants -p "${crate}" --timeout "${timeout}" --copy-target=false &
            local pid=$!

            while kill -0 "${pid}" 2>/dev/null; do
              echo "...still running: cargo mutants -p ${crate}"
              sleep 60
            done

            wait "${pid}"
          }
          echo "shiplog::schema is inlined; covered by the shiplog package mutation target."
          echo "shiplog::redact is inlined; covered by the shiplog package mutation target."
          echo "shiplog::coverage is inlined; covered by the shiplog package mutation target."
          echo "shiplog::ids is inlined; covered by the shiplog package mutation target."
          echo "shiplog::ports is inlined; covered by the shiplog package mutation target."
          echo "shiplog::bundle is inlined; covered by the shiplog package mutation target."
          exit $fail

      - name: Run mutation tests for Tier 2 crates
        id: tier2
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 2: pipeline and output crates..."
          echo "shiplog::engine is inlined; covered by the shiplog package mutation target."
          echo "shiplog::workstreams is inlined; covered by the shiplog package mutation target."
          echo "shiplog::cache is inlined; covered by the shiplog package mutation target."
          echo "shiplog::merge is inlined; covered by the shiplog package mutation target."
          exit $fail

      - name: Run mutation tests for Tier 3 crates
        id: tier3
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 3: adapters and optional boundaries..."
          echo "Source adapters are inlined; covered by the shiplog package mutation target."
          echo "shiplog::cluster_llm is inlined; covered by the shiplog package mutation target."
          echo "shiplog::team is inlined; covered by the shiplog package mutation target."
          cargo mutants -p shiplog --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Report mutation results
        if: always()
        run: |
          if [ "${{ steps.tier1.outcome }}" = "failure" ] || \
             [ "${{ steps.tier2.outcome }}" = "failure" ] || \
             [ "${{ steps.tier3.outcome }}" = "failure" ]; then
            echo "::warning::Mutation testing found surviving mutants in one or more tiers"
            echo "Mutation testing found surviving mutants in one or more tiers." >> $GITHUB_STEP_SUMMARY
            echo "This workflow is advisory until mutation score baselines are established." >> $GITHUB_STEP_SUMMARY
          else
            echo "Mutation testing completed without surviving mutants in the configured tiers." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload mutation test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-test-results
          path: |
            target/mutants/out/
            target/mutants/**/*.html
          retention-days: 30

      - name: Generate mutation test summary
        if: always()
        run: |
          echo "# Mutation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Mutation testing completed. Check the uploaded artifacts for details." >> $GITHUB_STEP_SUMMARY
