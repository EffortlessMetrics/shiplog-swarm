name: Mutation Testing

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  mutation-test:
    name: Mutation Testing
    # The current mutation suite is a long-running baseline signal with known
    # surviving mutants. Keep it off the PR gate until score baselines are
    # established and enforced deliberately.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutation
          save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests for Tier 1 crates
        id: tier1
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 1: stable contracts and trust surfaces..."
          run_mutants_keepalive () {
            local crate="$1"
            local timeout="$2"

            echo "Running cargo mutants for ${crate} (timeout=${timeout}s)..."
            cargo mutants -p "${crate}" --timeout "${timeout}" --copy-target=false &
            local pid=$!

            while kill -0 "${pid}" 2>/dev/null; do
              echo "...still running: cargo mutants -p ${crate}"
              sleep 60
            done

            wait "${pid}"
          }
          cargo mutants -p shiplog-schema --timeout 180 --copy-target=false || fail=1
          cargo mutants -p shiplog-redact --timeout 180 --copy-target=false || fail=1
          run_mutants_keepalive shiplog-coverage 600 || fail=1
          cargo mutants -p shiplog-ids --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ports --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-bundle --timeout 150 --copy-target=false || fail=1
          exit $fail

      - name: Run mutation tests for Tier 2 crates
        id: tier2
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 2: pipeline and output crates..."
          cargo mutants -p shiplog-engine --timeout 150 --copy-target=false || fail=1
          cargo mutants -p shiplog-workstreams --timeout 150 --copy-target=false || fail=1
          cargo mutants -p shiplog-render-md --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-render-json --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cache --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-merge --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Run mutation tests for Tier 3 crates
        id: tier3
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 3: adapters and optional boundaries..."
          cargo mutants -p shiplog-ingest-github --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-json --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-manual --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-git --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-gitlab --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-jira --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-linear --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cluster-llm --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-team --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Report mutation results
        if: always()
        run: |
          if [ "${{ steps.tier1.outcome }}" = "failure" ] || \
             [ "${{ steps.tier2.outcome }}" = "failure" ] || \
             [ "${{ steps.tier3.outcome }}" = "failure" ]; then
            echo "::warning::Mutation testing found surviving mutants in one or more tiers"
            echo "Mutation testing found surviving mutants in one or more tiers." >> $GITHUB_STEP_SUMMARY
            echo "This workflow is advisory until mutation score baselines are established." >> $GITHUB_STEP_SUMMARY
          else
            echo "Mutation testing completed without surviving mutants in the configured tiers." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload mutation test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-test-results
          path: |
            target/mutants/out/
            target/mutants/**/*.html
          retention-days: 30

      - name: Generate mutation test summary
        if: always()
        run: |
          echo "# Mutation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Mutation testing completed. Check the uploaded artifacts for details." >> $GITHUB_STEP_SUMMARY
