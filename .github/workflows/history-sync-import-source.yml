name: One-time shiplog source object report

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: one-time-shiplog-source-object-report
  cancel-in-progress: false

jobs:
  report-objects:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report exact source commit and tree objects
        shell: bash
        env:
          SWARM_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          mkdir source-object-report
          cd source-object-report
          git init -q
          git remote add source https://github.com/EffortlessMetrics/shiplog.git
          git fetch --quiet --no-tags source main

          source_sha="$(git rev-parse FETCH_HEAD)"
          source_tree="$(git rev-parse "${source_sha}^{tree}")"

          echo "HISTORY_SYNC_SOURCE_SHA=${source_sha}"
          echo "HISTORY_SYNC_SOURCE_TREE=${source_tree}"
          echo "HISTORY_SYNC_SWARM_BASE_SHA=${SWARM_BASE_SHA}"
