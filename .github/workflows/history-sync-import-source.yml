name: One-time shiplog source history import

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-shiplog-source-history-import
  cancel-in-progress: false

jobs:
  import-history:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the merged trigger commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Create the reciprocal history-preserving merge
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "EffortlessSteven"
          git config user.email "git@effortlesssteven.com"

          git remote add source https://github.com/EffortlessMetrics/shiplog.git
          git fetch --no-tags source main

          git checkout -B sync/history-preserving-shiplog-20260712 "${GITHUB_SHA}"
          source_sha="$(git rev-parse source/main)"

          git merge \
            --no-ff \
            --no-commit \
            --allow-unrelated-histories \
            -s ours \
            source/main
          git read-tree --reset -u "source/main^{tree}"
          git rm -f --ignore-unmatch .github/workflows/history-sync-import-source.yml .history-sync-trigger
          git commit \
            -m "merge(sync): join shiplog source history through ${source_sha:0:12}" \
            -m "Keep shiplog-swarm/main as the first parent, record shiplog/main as the second parent, and use the released shiplog tree as the merged result. Remove the one-time import workflow and trigger marker from that result." \
            -m "[skip ci]"

          git push origin HEAD:refs/heads/sync/history-preserving-shiplog-20260712

          if git push origin HEAD:refs/heads/main; then
            echo "Fast-forwarded shiplog-swarm/main directly"
          else
            echo "Direct main update is protected; the exact merge remains on the sync branch"
          fi

          git push origin --delete agent/bootstrap-source-history-import-20260712 || true
          git push origin --delete agent/run-source-history-import-20260712 || true
          git push origin --delete agent/retry-source-history-import-20260712 || true
