name: One-time shiplog source object report

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write

concurrency:
  group: one-time-shiplog-source-object-report
  cancel-in-progress: false

jobs:
  report-objects:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report exact source commit and tree objects
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SWARM_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          mkdir source-object-report
          cd source-object-report
          git init -q
          git remote add source https://github.com/EffortlessMetrics/shiplog.git
          git fetch --quiet --no-tags source main

          source_sha="$(git rev-parse FETCH_HEAD)"
          source_tree="$(git rev-parse "${source_sha}^{tree}")"
          body="history-sync-object-report
          source_sha=${source_sha}
          source_tree=${source_tree}
          swarm_base_sha=${SWARM_BASE_SHA}"

          jq -n --arg body "${body}" '{body: $body}' > comment.json
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --data-binary @comment.json
