name: Droid Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: droid-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.title, '[skip-review]')
    runs-on: ${{ github.repository == 'EffortlessMetrics/shiplog-swarm' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ""
      ANTHROPIC_BASE_URL: ""
    steps:
      - name: Skip when Droid secrets are unavailable
        if: env.FACTORY_API_KEY == '' || env.MINIMAX_API_KEY == ''
        run: echo "FACTORY_API_KEY or MINIMAX_API_KEY is not configured; skipping Droid auto review."

      - name: Checkout repository
        if: env.FACTORY_API_KEY != '' && env.MINIMAX_API_KEY != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure MiniMax M3 for Droid BYOK
        if: env.FACTORY_API_KEY != '' && env.MINIMAX_API_KEY != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.factory"
          cat > "$HOME/.factory/settings.json" <<JSON
          {
            "customModels": [
              {
                "model": "MiniMax-M3",
                "displayName": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX_API_KEY}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

      - name: Run Droid Auto Review with MiniMax M3 BYOK
        if: env.FACTORY_API_KEY != '' && env.MINIMAX_API_KEY != ''
        continue-on-error: true
        uses: EffortlessMetrics/droid-action-safe@7c1377ccbacddc95560d1570547a5baa51de01ec # safe pinned Droid action; raw debug artifact upload disabled
        with:
          factory_api_key: ${{ env.FACTORY_API_KEY }}
          upload_debug_artifacts: false

          automatic_review: true
          automatic_security_review: true

          review_depth: shallow
          review_model: "custom:MiniMax-M3-0"
          security_model: "custom:MiniMax-M3-0"

          security_severity_threshold: high
          security_block_on_critical: true
          security_block_on_high: false

          include_suggestions: true
          show_full_output: false
