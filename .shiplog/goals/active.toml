id = "shiplog-user-polish"
title = "Shiplog user-polish release"
status = "active"
owner = "codex"
created = "2026-05-13"

proposal = "docs/proposals/SHIPLOG-PROP-0001-user-polish-release.md"
plan = "plans/user-polish/implementation-plan.md"

objective = """
Make shiplog easy to use from empty directory to defensible review pack:
clear intake output, latest-artifact opening, canonical report JSON, honest
freshness semantics, safe sharing posture, repair guidance, and release proof.
"""

north_star = """
Shiplog's product receipts and development receipts have the same shape:
claim, source, freshness, proof, gaps, and next action.
"""

completed_prs = [
  "https://github.com/EffortlessMetrics/shiplog/pull/230",
  "https://github.com/EffortlessMetrics/shiplog/pull/231",
  "https://github.com/EffortlessMetrics/shiplog/pull/232",
  "https://github.com/EffortlessMetrics/shiplog/pull/233",
  "https://github.com/EffortlessMetrics/shiplog/pull/234",
  "https://github.com/EffortlessMetrics/shiplog/pull/235",
  "https://github.com/EffortlessMetrics/shiplog/pull/236",
  "https://github.com/EffortlessMetrics/shiplog/pull/237",
  "https://github.com/EffortlessMetrics/shiplog/pull/238",
  "https://github.com/EffortlessMetrics/shiplog/pull/243",
  "https://github.com/EffortlessMetrics/shiplog/pull/244",
]

rules = [
  "Specs define behavior. Plans define PR order. Guides teach users. Ledgers record proof and exceptions.",
  "Do not reopen protected-fields or disallowed_fields.",
  "Do not implement skipped-source freshness before source identity canonicalization.",
  "Do not emit stale until ApiCache exposes CacheLookup::{Fresh, Stale, Miss}.",
  "Every PR carries scope, expected files, behavior change, validation, rollback, and follow-up.",
]

end_state = [
  "shiplog intake prints useful next-step commands after a successful run",
  "shiplog open intake-report --latest and shiplog open packet --latest work reliably",
  "intake.report.json source identities are canonical and joinable",
  "source_freshness includes honest fresh/cached/skipped/unavailable states with reasons where required",
  "stale is emitted only after CacheLookup can prove stale rows",
  "recorded fixtures prove warm rerun freshness without live network",
  "release notes separate user-facing improvements from internal proof work",
]

