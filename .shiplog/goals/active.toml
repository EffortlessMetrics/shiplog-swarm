id = "shiplog-evidence-repair-quality"
title = "Shiplog evidence repair quality lane"
status = "active"
owner = "codex"
created = "2026-05-14"

proposal = "docs/proposals/SHIPLOG-PROP-0002-evidence-repair-loop.md"
crate_surface_archive = ".shiplog/goals/archive/2026-05-14-crate-surface-0.7.0.toml"
release_checkpoint = "v0.7.0"

objective = """
Make Shiplog better after the 0.7.0 crate-surface cut: turn trustworthy
first-run reports into specific, safe, receipt-derived repair actions without
creating a second source-state classifier or weakening report safety.
"""

north_star = """
Shiplog should help a user improve a rough packet, not merely describe why the
packet is rough.
"""

end_state = [
  "shiplog repair plan --latest reads the latest intake report and prints a stable repair queue",
  "repair items are derived from existing intake report receipts, not live source rediscovery",
  "repair items are machine-readable with deterministic IDs, source links, reasons, actions, and clear conditions",
  "journal-backed manual evidence gaps can be repaired with a copyable command",
  "skipped, stale, cached, and unavailable source guidance stays tied to existing receipts",
  "repair diff can show cleared, changed, new, and still-open repair items across the latest runs",
  "the end-to-end proof shows a cold first run, repair plan, journal repair, rerun, and improved packet",
  "release notes and docs explain the repair loop as product quality, not just a version increment",
]

rules = [
  "Do not add a second classifier for source health.",
  "Do not scrape intake.report.md for machine control flow.",
  "Do not add live provider mutation or ticket edits in this lane.",
  "Do not leak tokens, secret values, private opaque IDs, or internal-only source details through repair actions.",
  "Do not change existing first-run behavior except through a spec-backed repair-loop change.",
  "Preserve report compatibility or document any compatibility boundary explicitly before implementation.",
  "Keep the first implementation PRs spec/ADR/plan shaped before CLI behavior changes.",
]

[[released_checkpoint]]
version = "0.7.0"
tag = "v0.7.0"
github_release = "https://github.com/EffortlessMetrics/shiplog/releases/tag/v0.7.0"
crates_io = "https://crates.io/crates/shiplog/0.7.0"
meaning = "Crate boundaries are stable enough to resume product-quality work."

