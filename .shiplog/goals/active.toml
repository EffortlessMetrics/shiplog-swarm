id = "shiplog-crate-surface-0.7"
title = "Shiplog 0.7 crate-surface contraction"
status = "active"
owner = "codex"
created = "2026-05-14"

proposal = "docs/proposals/SHIPLOG-PROP-0003-crate-surface-contraction.md"
spec = "docs/specs/SHIPLOG-SPEC-0004-public-crate-support-tiers.md"
plan = "plans/crate-surface/implementation-plan.md"
crate_audit = "docs/release/0.7-crate-surface.md"
publish_policy = "policy/publish-allowlist.toml"

objective = """
Prepare shiplog 0.7.0 as the crate-surface contraction release: keep the
supported public crates.io surface to shiplog, make implementation crates
internal or unpublished, prevent release tooling from publishing unsupported
packages, and preserve the 0.6.0 first-run product behavior.
"""

north_star = """
Shiplog should be modular in the repo, not accidentally public on crates.io.
"""

end_state = [
  "shiplog is the only default 0.7 publish-eligible package",
  "shiplog-schema is internal; contracts/schemas remains the public machine contract",
  "non-public implementation crates are removed from the forward publish graph or retained only as unpublished repo support",
  "the published shiplog package does not depend on historical 0.6 implementation crates",
  "release tooling fails closed when a non-public package enters the publish order",
  "0.6 implementation crates are documented as historical and are not yanked as routine cleanup",
  "0.6 first-run behavior remains unchanged and tested",
  "Evidence Repair Loop remains paused until crate boundaries are stable",
]

rules = [
  "Do not change user-visible first-run behavior unless a spec says so.",
  "Do not change report JSON or schema compatibility in crate-collapse PRs.",
  "Do not remove or rename Cargo features without an explicit release contract.",
  "Do not start Evidence Repair Loop work in this lane.",
  "Do not yank 0.6 implementation crates as routine cleanup.",
  "Every retained public crate needs an ADR-backed support reason.",
  "Every collapsed crate needs proof that CLI and report behavior is unchanged.",
]

[[linked_adr]]
id = "SHIPLOG-ADR-0004"
path = "docs/adr/SHIPLOG-ADR-0004-srp-modules-over-public-microcrates.md"
purpose = "Use crates for external contracts and modules for internal SRP structure."

[[linked_adr]]
id = "SHIPLOG-ADR-0005"
path = "docs/adr/SHIPLOG-ADR-0005-json-schemas-over-public-rust-schema-crate.md"
purpose = "JSON schemas are the public machine contract; shiplog-schema is internal for 0.7."

