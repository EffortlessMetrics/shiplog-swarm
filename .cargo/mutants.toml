# Runtime configuration for cargo-mutants.
# Tier plan and crate assignments live in `cargo-mutants.toml` (project root).
# CI workflow: `.github/workflows/mutation-testing.yml`.

# Minimum timeout per test, in seconds.
minimum_test_timeout = 60

# Timeout multiplier relative to the baseline `cargo test`.
timeout_multiplier = 3.0

# Build timeout multiplier relative to the baseline `cargo build`.
build_timeout_multiplier = 2.0

# Cap lints so deny-warnings doesn't kill mutant builds.
cap_lints = true

# Only mutate source files in product crates and transitional internal carriers.
# Deleted generic/planned package shells are intentionally absent.
examine_globs = [
  "crates/shiplog-schema/src/**/*.rs",
  "crates/shiplog-ids/src/**/*.rs",
  "crates/shiplog-redact/src/**/*.rs",
  "crates/shiplog-coverage/src/**/*.rs",
  "crates/shiplog-ports/src/**/*.rs",
  "crates/shiplog-engine/src/**/*.rs",
  "crates/shiplog-bundle/src/**/*.rs",
  "crates/shiplog-workstreams/src/**/*.rs",
  "crates/shiplog-workstream-cluster/src/**/*.rs",
  "crates/shiplog-workstream-receipt-policy/src/**/*.rs",
  "crates/shiplog-workstream-layout/src/**/*.rs",
  "crates/shiplog-ingest-github/src/**/*.rs",
  "crates/shiplog-ingest-json/src/**/*.rs",
  "crates/shiplog-ingest-manual/src/**/*.rs",
  "crates/shiplog-ingest-git/src/**/*.rs",
  "crates/shiplog-ingest-gitlab/src/**/*.rs",
  "crates/shiplog-ingest-jira/src/**/*.rs",
  "crates/shiplog-ingest-linear/src/**/*.rs",
  "crates/shiplog-render-md/src/**/*.rs",
  "crates/shiplog-render-json/src/**/*.rs",
  "crates/shiplog-cache/src/**/*.rs",
  "crates/shiplog-template/src/**/*.rs",
  "crates/shiplog-merge/src/**/*.rs",
  "crates/shiplog-cluster-llm/src/**/*.rs",
  "crates/shiplog-team/src/**/*.rs",
  "apps/shiplog/src/**/*.rs",
]

# Files / directories that should never be mutated.
exclude_globs = [
  "target/**",
  "out/**",
  "examples/**",
  "fuzz/**",
  "crates/shiplog-testkit/**",
]

# Skip trivial Display / Debug / Default impls — they rarely catch real bugs.
exclude_re = [
  "Display for",
  "Debug for",
  "Default for",
]
