# Mutation testing tier plan for shiplog
#
# This is a planning document that maps the current module-first workspace to
# mutation-testing tiers. The actual cargo-mutants runtime configuration lives
# in `.cargo/mutants.toml`; the CI workflow invokes `cargo mutants -p <crate>`
# according to these tiers.
#
# Run examples:
#   cargo mutants --workspace
#   cargo mutants -p shiplog-schema
#   cargo mutants -p shiplog-schema -- test_name

# ============================================================================
# Tier 1: Stable contracts and trust surfaces - target score >= 90%
# Deterministic logic, privacy, completeness, and canonical data contracts.
# ============================================================================
#
# shiplog-schema        - canonical event model, coverage types, bundle metadata
# shiplog-ids           - SHA-256 deterministic ID generation
# shiplog-ports         - trait definitions (Ingestor, Renderer, Redactor, Clusterer)
# shiplog-redact        - HMAC-SHA-256 redaction orchestrator
# shiplog-coverage      - slicing, completeness, time-window logic
# shiplog-bundle        - zip export and bundle manifests

# ============================================================================
# Tier 2: Product pipeline - target score >= 80%
# Orchestration, curation, output, and supported reusable product behavior.
# ============================================================================
#
# shiplog-engine        - orchestration (ingest -> cluster -> render)
# shiplog-workstreams   - workstream facade (curated + suggested)
# shiplog-render-md     - Markdown renderer (insta snapshot-tested)
# shiplog-render-json   - JSON renderer
# shiplog-cache         - API cache facade
# shiplog-merge         - multi-source event merge and deduplication

# ============================================================================
# Tier 3: Real adapters and optional boundaries - target score >= 70%
# External-system adapters and feature-gated integration surfaces.
# ============================================================================
#
# shiplog-ingest-github - GitHub API adapter
# shiplog-ingest-json   - JSONL import adapter
# shiplog-ingest-manual - manual YAML ingest adapter
# shiplog-ingest-git    - local git-log ingest adapter
# shiplog-ingest-gitlab - GitLab API adapter
# shiplog-ingest-jira   - Jira API adapter
# shiplog-ingest-linear - Linear API adapter
# shiplog-cluster-llm   - optional LLM-assisted workstream clustering
# shiplog-team          - optional team aggregation facade
# apps/shiplog          - CLI entrypoint

# ============================================================================
# Transitional internal carriers
# ============================================================================
#
# These packages still exist as implementation carriers while the repository
# preserves behavior. They are not the target public doctrine; fold them into
# owner modules over time unless API_SURFACE.md deliberately promotes them.
#
# shiplog-template

# ============================================================================
# Excluded from mutation testing
# ============================================================================
#
# shiplog-testkit - test fixtures / utilities (not production code)
#
# Generic utility, data-structure, planned app-shell, and planned feature
# packages were removed from the workspace surface. New seams should be modules
# first, not new crates.
